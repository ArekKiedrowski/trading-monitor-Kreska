<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>System O v5 PRO Console</title>
<style>
:root{
  --bg:#0d0f14;--card:#161920;--card2:#1f2430;--line:rgba(255,255,255,.09);
  --txt:#e7ebf3;--muted:#8b93a5;--green:#10b981;--red:#ef4444;--gold:#f59e0b;
  --blue:#3b82f6;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,Arial,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
h1{margin:0;font-size:28px}
.sub{color:var(--muted);margin-top:6px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.badge{background:var(--card2);border:1px solid var(--line);padding:8px 12px;border-radius:999px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}
.metric{font-size:30px;font-weight:800}
.label{color:var(--muted);font-size:13px;margin-top:4px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
button{border:0;border-radius:12px;padding:10px 14px;background:var(--card2);color:var(--txt);cursor:pointer;font-weight:700}
button:hover{filter:brightness(1.12)}
.primary{background:var(--blue)}
.danger{background:var(--red)}
.good{background:var(--green)}
.warn{background:var(--gold);color:#111}
.tabs{display:flex;gap:8px;margin:18px 0}
.tab{padding:9px 14px;border-radius:999px;background:var(--card2);color:var(--muted)}
.tab.active{background:var(--txt);color:#111}
.setup{border-left:4px solid var(--green);margin-bottom:14px}
.setup.watch{border-left-color:var(--gold)}
.setup.invalid{border-left-color:var(--red)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:14px}
.box{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px}
.box b{display:block;font-size:18px;margin-top:3px}
.reason{color:var(--muted);font-size:14px;line-height:1.5;margin-top:12px}
.log{height:300px;overflow:auto;background:#080a0f;border:1px solid var(--line);border-radius:16px;padding:12px;font-family:monospace;font-size:13px;white-space:pre-wrap}
input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px}
.form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;margin-top:12px}
@media(max-width:850px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .row{grid-template-columns:repeat(2,1fr)}
  .form{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>System O v5 PRO Console</h1>
      <div class="sub">Quant-Momentum / Bone Zone / Pullback Filter / Risk Control / Journal</div>
    </div>
    <div class="badge">Mode: LOCAL · Risk A+ 2% · A 1%</div>
  </div>

  <div class="grid">
    <div class="card"><div class="metric" id="pendingCount">0</div><div class="label">Pending</div></div>
    <div class="card"><div class="metric" id="activeCount">0</div><div class="label">Active</div></div>
    <div class="card"><div class="metric" id="avgScore">0</div><div class="label">Avg Score</div></div>
    <div class="card"><div class="metric" id="riskPlanned">$0</div><div class="label">Risk Planned</div></div>
  </div>

  <div class="actions">
    <button class="primary" onclick="simulateScan()">Simulate scan</button>
    <button onclick="render()">Refresh</button>
    <button class="danger" onclick="resetAll()">Reset</button>
    <button onclick="exportData()">Export</button>
    <button onclick="importData()">Import</button>
  </div>

  <div class="tabs">
    <div class="tab active">Pending</div>
    <div class="tab">Active</div>
    <div class="tab">Journal</div>
  </div>

  <div class="card">
    <h3>Pending setups</h3>
    <div id="pendingList"></div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3>Active trades</h3>
    <div id="activeList"></div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3>Manual trade</h3>
    <div class="form">
      <input id="mTicker" placeholder="ticker: btc / tsla / nvda / goog" />
      <input id="mEntry" placeholder="entry" type="number" step="0.01" />
      <input id="mSL" placeholder="SL" type="number" step="0.01" />
      <select id="mGrade">
        <option>A+</option>
        <option>A</option>
        <option>WATCH</option>
      </select>
      <button class="good" onclick="addManual()">Add pending</button>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3>Console log</h3>
    <button onclick="clearLog()">Clear</button>
    <div class="log" id="logBox"></div>
  </div>
</div>

<script>
const VERSION = 'SYSTEM_O_V5_PRO';
const STORAGE_KEY = 'system_o_v5_pro_state';

const ACCOUNT_BALANCE = 10000;

const INSTRUMENTS = {
  btc:  { name:'BTC',  minRR:4, dec:2 },
  tsla: { name:'TSLA', minRR:4, dec:2 },
  nvda: { name:'NVDA', minRR:4, dec:2 },
  goog: { name:'GOOG', minRR:3, dec:2 }
};

let state = {
  version: VERSION,
  pending: [],
  active: [],
  journal: [],
  logs: []
};

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed.version === VERSION) state = parsed;
    }
  }catch(e){}
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function now(){
  return new Date().toISOString().replace('T',' ').slice(0,19);
}

function log(msg){
  state.logs.unshift(`[${now()}] ${msg}`);
  state.logs = state.logs.slice(0,120);
  save();
  renderLog();
}

function money(v,d=0){
  return '$' + Number(v || 0).toFixed(d);
}

function riskByGrade(grade){
  if(grade === 'A+') return 0.02;
  if(grade === 'A') return 0.01;
  return 0;
}

function scoreToGrade(score){
  if(score >= 85) return 'A+';
  if(score >= 70) return 'A';
  if(score >= 55) return 'WATCH';
  return 'INVALID';
}

function calcPosition(entry, sl, riskPct){
  const riskUSD = ACCOUNT_BALANCE * riskPct;
  const riskUnit = Math.abs(entry - sl);
  if(riskUnit <= 0 || riskPct <= 0) {
    return { size:0, value:0, riskUSD:0, riskUnit };
  }

  let size = riskUSD / riskUnit;
  let value = size * entry;

  const maxValue = ACCOUNT_BALANCE * 1.0;

  if(value > maxValue){
    const factor = maxValue / value;
    size *= factor;
    value = maxValue;
  }

  return { size, value, riskUSD: Math.min(riskUSD, riskUnit * size), riskUnit };
}

function validateProSetup(s){
  if(s.extended) return { ok:false, reason:'AFTER IMPULSE / TOO LATE' };
  if(!s.trend) return { ok:false, reason:'NO TREND' };
  if(!s.bone) return { ok:false, reason:'NO EMA / BONE ZONE' };
  if(!s.pullback) return { ok:false, reason:'NO REAL PULLBACK' };
  if(!s.trigger) return { ok:false, reason:'WATCH ONLY — WAITING FOR TRIGGER' };
  return { ok:true, reason:'PRO PULLBACK CONFIRMED' };
}

function makeSetup(key, data){
  const instr = INSTRUMENTS[key];
  const pro = validateProSetup(data);
  const score = data.score;
  const grade = pro.ok ? scoreToGrade(score) : (score >= 55 ? 'WATCH' : 'INVALID');
  const riskPct = riskByGrade(grade);

  const entry = Number(data.entry);
  const sl = Number(data.sl);
  const tp2 = entry + Math.abs(entry - sl) * instr.minRR;

  const pos = calcPosition(entry, sl, riskPct);

  return {
    id: `${key}_${Date.now()}`,
    key,
    name: instr.name,
    direction:'LONG',
    grade,
    score,
    status: pro.ok ? 'TRIGGER' : 'WATCH',
    entry,
    sl,
    tp2,
    riskPct,
    size: pos.size,
    value: pos.value,
    riskUSD: pos.riskUSD,
    riskUnit: pos.riskUnit,
    proReason: pro.reason,
    checks: data,
    createdAt: now()
  };
}

function simulateScan(){
  const presets = {
    btc:  { score:72, trend:true,  bone:true,  pullback:true,  trigger:false, extended:false, entry:95000, sl:93200 },
    tsla: { score:64, trend:true,  bone:false, pullback:true,  trigger:false, extended:false, entry:245, sl:236 },
    nvda: { score:72, trend:true,  bone:true,  pullback:false, trigger:false, extended:true,  entry:208.10, sl:205.60 },
    goog: { score:78, trend:true,  bone:true,  pullback:true,  trigger:false, extended:false, entry:171.40, sl:168.20 }
  };

  Object.keys(presets).forEach(key => {
    const s = presets[key];
    const pro = validateProSetup(s);
    const status = pro.ok ? 'TRIGGER' : (s.score >= 55 ? 'WATCH' : 'SCANNING');
    log(`[SCAN] ${INSTRUMENTS[key].name} | Status: ${status} | Score: ${s.score} | ${pro.reason}`);
  });

  const candidate = presets.nvda;
  const setup = makeSetup('nvda', candidate);

  if(setup.status === 'TRIGGER'){
    addPending(setup);
  } else {
    log(`[NO ADD] NVDA blocked by v5 PRO: ${setup.proReason}`);
  }

  render();
}

function addPending(setup){
  const exists = state.pending.some(x => x.key === setup.key && Math.abs(x.entry - setup.entry) / setup.entry < 0.002);
  if(exists){
    log(`[SKIP] Duplicate pending: ${setup.name}`);
    return;
  }

  if(setup.riskPct > 0.02){
    log(`[BLOCK] Risk too high: ${setup.name}`);
    return;
  }

  if(setup.value > ACCOUNT_BALANCE){
    log(`[LIMIT] Exposure capped to account balance: ${setup.name}`);
  }

  state.pending.unshift(setup);
  log(`Pending added: ${setup.key} ${setup.grade} score ${setup.score}`);
  save();
  render();
}

function addManual(){
  const key = document.getElementById('mTicker').value.trim().toLowerCase();
  const entry = Number(document.getElementById('mEntry').value);
  const sl = Number(document.getElementById('mSL').value);
  const grade = document.getElementById('mGrade').value;

  if(!INSTRUMENTS[key] || !entry || !sl){
    log('[MANUAL] Invalid manual trade');
    return;
  }

  const score = grade === 'A+' ? 90 : grade === 'A' ? 75 : 60;
  const data = {
    score,
    trend:true,
    bone:true,
    pullback:true,
    trigger: grade !== 'WATCH',
    extended:false,
    entry,
    sl
  };

  const setup = makeSetup(key, data);

  if(grade === 'WATCH'){
    setup.grade = 'WATCH';
    setup.status = 'WATCH';
    setup.riskPct = 0;
    setup.size = 0;
    setup.value = 0;
    setup.riskUSD = 0;
  }

  addPending(setup);
}

function confirmTrade(id){
  const i = state.pending.findIndex(x => x.id === id);
  if(i === -1) return;

  const t = state.pending.splice(i,1)[0];

  if(t.riskPct <= 0){
    log(`[BLOCK] Cannot activate WATCH: ${t.name}`);
    state.pending.unshift(t);
    save();
    render();
    return;
  }

  t.activatedAt = now();
  state.active.unshift(t);
  log(`TRADE ACTIVE: ${t.key} moved from pending to active`);
  save();
  render();
}

function deletePending(id){
  state.pending = state.pending.filter(x => x.id !== id);
  save();
  render();
}

function markWatch(id){
  const t = state.pending.find(x => x.id === id);
  if(!t) return;
  t.grade = 'WATCH';
  t.status = 'WATCH';
  t.riskPct = 0;
  t.size = 0;
  t.value = 0;
  t.riskUSD = 0;
  log(`Marked WATCH: ${t.key}`);
  save();
  render();
}

function closeActive(id,result){
  const i = state.active.findIndex(x => x.id === id);
  if(i === -1) return;
  const t = state.active.splice(i,1)[0];
  t.closedAt = now();
  t.result = result;
  state.journal.unshift(t);
  log(`Trade closed: ${t.key} ${result}`);
  save();
  render();
}

function resetAll(){
  localStorage.removeItem(STORAGE_KEY);
  state = { version: VERSION, pending: [], active: [], journal: [], logs: [] };
  log('System reset — old v4.2 data removed');
  render();
}

function clearLog(){
  state.logs = [];
  save();
  renderLog();
}

function exportData(){
  const txt = JSON.stringify(state,null,2);
  navigator.clipboard.writeText(txt);
  log('Export copied to clipboard');
}

function importData(){
  const txt = prompt('Paste exported JSON');
  if(!txt) return;
  try{
    const parsed = JSON.parse(txt);
    if(parsed.version !== VERSION) throw new Error('Wrong version');
    state = parsed;
    save();
    log('Import OK');
    render();
  }catch(e){
    log('Import failed');
  }
}

function renderSetup(t, active=false){
  const cls = t.grade === 'WATCH' ? 'setup watch' : t.grade === 'INVALID' ? 'setup invalid' : 'setup';
  return `
    <div class="card ${cls}">
      <h3>${t.name} ${t.direction}</h3>
      <div><b>Grade:</b> ${t.grade} · <b>Score:</b> ${t.score}/100 · <b>${t.status}</b></div>

      <div class="row">
        <div class="box">Entry <b>${t.entry.toFixed(2)}</b></div>
        <div class="box">SL <b>${t.sl.toFixed(2)}</b></div>
        <div class="box">TP2 <b>${t.tp2.toFixed(2)}</b></div>
        <div class="box">Risk <b>${(t.riskPct*100).toFixed(1)}%</b></div>
        <div class="box">Size <b>${t.size.toFixed(4)}</b></div>
        <div class="box">Value <b>${money(t.value,0)}</b></div>
      </div>

      <div class="reason">
        <b>PRO:</b> ${t.proReason}<br>
        • Trend: ${t.checks.trend ? 'YES' : 'NO'}<br>
        • Bone Zone: ${t.checks.bone ? 'YES' : 'NO'}<br>
        • Pullback: ${t.checks.pullback ? 'YES' : 'NO'}<br>
        • Trigger: ${t.checks.trigger ? 'YES' : 'NO'}<br>
        • Extended move: ${t.checks.extended ? 'YES — blocked' : 'NO'}
      </div>

      <div class="actions">
        ${!active ? `<button class="good" onclick="confirmTrade('${t.id}')">Confirm → Active</button>
        <button class="warn" onclick="markWatch('${t.id}')">Keep Watch</button>
        <button class="danger" onclick="deletePending('${t.id}')">Delete</button>` :
        `<button class="good" onclick="closeActive('${t.id}','WIN')">Close WIN</button>
        <button class="danger" onclick="closeActive('${t.id}','LOSS')">Close LOSS</button>`}
      </div>
    </div>
  `;
}

function render(){
  document.getElementById('pendingCount').textContent = state.pending.length;
  document.getElementById('activeCount').textContent = state.active.length;

  const scores = state.pending.map(x => x.score);
  document.getElementById('avgScore').textContent = scores.length
    ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)
    : 0;

  const risk = state.pending.reduce((a,b)=>a+b.riskUSD,0);
  document.getElementById('riskPlanned').textContent = money(risk,0);

  document.getElementById('pendingList').innerHTML =
    state.pending.length ? state.pending.map(x => renderSetup(x,false)).join('') : '<div class="sub">No pending setups.</div>';

  document.getElementById('activeList').innerHTML =
    state.active.length ? state.active.map(x => renderSetup(x,true)).join('') : '<div class="sub">No active trades.</div>';

  renderLog();
}

function renderLog(){
  document.getElementById('logBox').textContent = state.logs.join('\n');
}

load();
log('System O v5 PRO Console loaded');
render();
</script>
</body>
</html>
