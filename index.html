<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>HYPER-MONITOR V1.61 | Quant OS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --green: #00ff88; --red: #ff4444; --text: #bbb; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; max-width: 1600px; margin: auto; }
        .hud-panel { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        h3 { margin: 0 0 15px 0; font-size: 11px; letter-spacing: 1px; color: #555; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        /* KPI Dashboard */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: #050505; padding: 10px; border: 1px solid var(--border); text-align: center; }
        .kpi-card span { display: block; font-size: 9px; color: #444; margin-bottom: 4px; }
        .kpi-card strong { font-size: 16px; color: #fff; }

        /* Signal List */
        .signal-item { font-size: 11px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .tag { font-size: 9px; padding: 2px 4px; border-radius: 2px; text-transform: uppercase; border: 1px solid transparent; }
        .tag-real { background: rgba(0,255,136,0.1); color: var(--green); border-color: var(--green); }
        .tag-ghost { background: rgba(85,85,85,0.1); color: #555; border-color: #555; }

        #chart-wrap { height: 450px; width: 100%; }
        button { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 10px; }
        button:hover { color: #fff; border-color: #555; }
    </style>
</head>
<body>

<div class="grid">
    <div class="sidebar">
        <div class="hud-panel">
            <h3>ACTIVE EXPOSURE</h3>
            <div id="active-stats" style="margin-bottom:10px;"></div>
            <div id="active-list"></div>
        </div>

        <div class="hud-panel">
            <h3>SIGNAL INGESTION (V1.61)</h3>
            <div id="signal-feed"></div>
        </div>

        <div style="text-align: center; opacity: 0.3;">
            <button onclick="Journal.clearAll()">RESET LOCAL DATABASE</button>
        </div>
    </div>

    <div class="main">
        <div class="hud-panel">
            <h3>PERFORMANCE ANALYTICS: TRADE SEQUENCE</h3>
            <div id="kpi-display" class="kpi-grid"></div>
            <div id="chart-wrap">
                <canvas id="equityChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * 1. KONFIGURACJA TELEGRAMA
 * Podmień poniższe dane na swoje.
 */
const Telegram = {
    token: "TU_WKLEJ_SWOJ_TOKEN", 
    chatId: "TU_WKLEJ_SWOJ_CHAT_ID",

    async send(msg) {
        if(this.token.includes("TU_WKLEJ")) return; // Nie wysyłaj jeśli nie ustawiono
        try {
            const url = `https://api.telegram.org/bot${this.token}/sendMessage?chat_id=${this.chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
            await fetch(url);
        } catch (e) { console.error("Telegram Error:", e); }
    }
};

/**
 * 2. JOURNAL & DATABASE
 */
const Journal = {
    events: JSON.parse(localStorage.getItem('quant_v16_log') || '[]'),
    processed: new Set(JSON.parse(localStorage.getItem('quant_v16_ids') || '[]')),

    addEvent(type, data) {
        const e = { 
            id: Date.now() + Math.random(), 
            type, 
            timestamp: new Date().toISOString(), 
            ...data 
        };
        this.events.push(e);
        if(data.tradeId) this.processed.add(data.tradeId);
        
        localStorage.setItem('quant_v16_log', JSON.stringify(this.events));
        localStorage.setItem('quant_v16_ids', JSON.stringify([...this.processed]));

        // --- LOGIKA POWIADOMIEŃ TELEGRAM ---
        if (type === 'TRADE_OPEN' && !data.isGhost) {
            Telegram.send(`🚀 *NOWY SETUP: REAL*\n🆔 ID: \`${data.tradeId}\`\n🛠 Silnik: ${data.engine}\n\n👉 Sprawdź parametry i otwórz XTB!`);
        }
        if (type === 'TRADE_CLOSE') {
            const icon = data.resultR > 0 ? "✅" : "❌";
            Telegram.send(`${icon} *TRADE ZAMKNIĘTY*\n🆔 ID: \`${data.tradeId}\`\n💰 Wynik: *${data.resultR} R*`);
        }

        return e;
    },

    getClosedSummaries() {
        const trades = [];
        const opens = this.events.filter(e => e.type === 'TRADE_OPEN');
        const closes = this.events.filter(e => e.type === 'TRADE_CLOSE');

        opens.forEach(op => {
            const cl = closes.find(c => c.tradeId === op.tradeId);
            if(cl) {
                trades.push({
                    id: op.tradeId,
                    isGhost: op.isGhost,
                    resultR: cl.resultR,
                    closedAt: cl.timestamp,
                    engine: op.engine
                });
            }
        });
        return trades;
    },

    clearAll() { if(confirm("Czy na pewno wyczyścić całą bazę danych?")) { localStorage.clear(); location.reload(); } }
};

/**
 * 3. ANALYTICS ENGINE
 */
const AnalyticsEngine = {
    getCurve(mode = 'REAL') {
        const data = Journal.getClosedSummaries().sort((a,b) => new Date(a.closedAt) - new Date(b.closedAt));
        let cum = 0;
        const pts = [{ x: 0, y: 0 }];
        
        data.forEach((t) => {
            const match = (mode === 'REAL') ? !t.isGhost : true;
            if(match) {
                cum += t.resultR;
                pts.push({ x: pts.length, y: Number(cum.toFixed(2)) });
            }
        });
        return pts;
    },

    getKPIs() {
        const trades = Journal.getClosedSummaries().filter(t => !t.isGhost);
        if(trades.length < 2) return null;

        const wins = trades.filter(t => t.resultR > 0);
        const grossP = wins.reduce((s,t) => s + t.resultR, 0);
        const grossL = Math.abs(trades.filter(t => t.resultR <= 0).reduce((s,t) => s + t.resultR, 0));

        return {
            pf: grossL === 0 ? 'INF' : (grossP / grossL).toFixed(2),
            exp: ((grossP - grossL) / trades.length).toFixed(2),
            wr: (wins.length / trades.length * 100).toFixed(0) + '%',
            vol: trades.length
        };
    }
};

/**
 * 4. UI RENDERER
 */
const UI = {
    chart: null,
    init() {
        const ctx = document.getElementById('equityChart').getContext('2d');
        this.chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    { label: 'REAL EQUITY (R Sequence)', data: [], borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.05)', fill: true, tension: 0.1 },
                    { label: 'GHOST BASELINE (R Sequence)', data: [], borderColor: '#444', borderDash: [5,5], fill: false, tension: 0.1 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', title: { display: true, text: 'TRADE SEQUENCE INDEX', color: '#444' }, grid: { color: '#1a1a1a' } },
                    y: { grid: { color: '#1a1a1a' }, title: { display: true, text: 'CUMULATIVE R', color: '#444' } }
                },
                plugins: { legend: { position: 'top', align: 'end', labels: { color: '#888', font: { size: 10 } } } }
            }
        });
    },
    refresh() {
        if(!this.chart) this.init();
        this.chart.data.datasets[0].data = AnalyticsEngine.getCurve('REAL');
        this.chart.data.datasets[1].data = AnalyticsEngine.getCurve('GHOST');
        this.chart.update('none');

        const k = AnalyticsEngine.getKPIs();
        document.getElementById('kpi-display').innerHTML = k ? `
            <div class="kpi-card"><span>PROFIT FACTOR</span><strong>${k.pf}</strong></div>
            <div class="kpi-card"><span>EXPECTANCY</span><strong>${k.exp}R</strong></div>
            <div class="kpi-card"><span>WIN RATE</span><strong>${k.wr}</strong></div>
            <div class="kpi-card"><span>SAMPLES</span><strong>${k.vol}</strong></div>
        ` : '<div style="color:#444; padding: 10px;">AWAITING DATA SAMPLES...</div>';
    }
};

/**
 * 5. RUNTIME (Loop & Simulation)
 */
const Runtime = {
    tick() {
        const allEvents = Journal.events;
        const opens = allEvents.filter(e => e.type === 'TRADE_OPEN' && !allEvents.some(c => c.type === 'TRADE_CLOSE' && c.tradeId === e.tradeId));
        
        // Symulacja zamykania (tylko do testów, w realu robi to OutcomeTracker)
        opens.forEach(t => {
            if(Math.random() > 0.9) {
                Journal.addEvent('TRADE_CLOSE', { 
                    tradeId: t.tradeId, 
                    resultR: Number((Math.random() * 4 - 1.2).toFixed(2)) 
                });
            }
        });

        // Symulacja nowych sygnałów (tylko do testów, w realu robi to SignalBridge)
        if(Math.random() > 0.8) {
            const tid = `T-${Math.floor(Math.random()*9000 + 1000)}`;
            Journal.addEvent('TRADE_OPEN', { 
                tradeId: tid, 
                engine: 'PO3_V1', 
                isGhost: Math.random() > 0.6 
            });
        }

        this.renderActive(opens);
        this.renderFeed();
        UI.refresh();
    },

    renderActive(opens) {
        const realCount = opens.filter(o => !o.isGhost).length;
        document.getElementById('active-stats').innerHTML = `
            <div style="font-size:11px; color:#666; background:#000; padding:5px; border-left:2px solid var(--green);">
                REAL EXPOSURE: <strong>${realCount} / 5 SLOTS</strong>
            </div>
        `;
        document.getElementById('active-list').innerHTML = opens.map(o => `
            <div class="signal-item">
                <span>${o.tradeId} <small style="color:#555">(${o.engine})</small></span>
                <span class="tag ${o.isGhost ? 'tag-ghost' : 'tag-real'}">${o.isGhost ? 'ghost' : 'active'}</span>
            </div>
        `).join('');
    },

    renderFeed() {
        const latest = Journal.events.filter(e => e.type === 'TRADE_OPEN').reverse().slice(0, 5);
        document.getElementById('signal-feed').innerHTML = latest.map(l => `
            <div class="signal-item">
                <span>${l.tradeId}</span>
                <span style="color:#555">${new Date(l.timestamp).toLocaleTimeString()}</span>
            </div>
        `).join('');
    }
};

// START SYSTEM
UI.init();
setInterval(() => Runtime.tick(), 3000);
Runtime.tick();

</script>
</body>
</html>
