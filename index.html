<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANT OS · CONSOLE</title>
    <style>
        :root {
            --bg: #0d0f14; --card: #161920; --border: #242933;
            --text: #e2e8f0; --muted: #64748b;
            --green: #10b981; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; letter-spacing: -0.02em; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; max-width: 900px; margin: 0 auto 24px auto; }
        .logo { font-weight: 900; font-size: 13px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.2em; }
        .macro-status { background: rgba(16, 185, 129, 0.1); color: var(--green); padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; border: 1px solid rgba(16, 185, 129, 0.2); }

        .grid { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }
        
        /* Signal Card */
        .sig { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 16px 20px; 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr; 
            align-items: center; 
            position: relative; 
        }

        /* Side Indicators (Traffic Lights) */
        .sig.class-A { border-left: 4px solid var(--green); }
        .sig.class-B { border-left: 4px solid var(--amber); }
        .sig.class-C { border-left: 4px solid var(--muted); opacity: 0.4; }

        /* Typography */
        .label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        .asset { font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .dir-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 900; }
        .short { background: rgba(239,68,68,0.15); color: var(--red); }
        .long { background: rgba(16,185,129,0.15); color: var(--green); }
        
        .val { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; }
        .tp1 { color: var(--green); }
        .tp2 { color: var(--muted); font-size: 14px; }
        .sl { color: var(--red); }
        
        .age-box { text-align: right; }
        .age { font-size: 10px; color: var(--muted); font-weight: 600; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .dot-A { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot-B { background: var(--amber); }
        .dot-C { background: var(--muted); }

        @media (max-width: 768px) {
            .sig { grid-template-columns: 1fr 1fr; gap: 15px; }
            .age-box { 
                grid-column: span 2; 
                text-align: left; 
                border-top: 1px solid var(--border); 
                padding-top: 10px; 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">Quant OS · Console</div>
        <div id="macro-guard" class="macro-status">🟢 CLEAR — NO EVENTS</div>
    </div>

    <div class="grid">
        <div class="sig class-A">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">US500 <span class="dir-tag short">SHORT</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">5219.9</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">5242.8</div>
            </div>
            <div>
                <div class="label">TP1</div>
                <div class="val tp1">5202.6</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2</div>
                    <div class="val tp2">5185.4</div>
                </div>
                <div class="age">1m ago <span class="status-dot dot-A"></span></div>
            </div>
        </div>

        <div class="sig class-B">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">EURUSD <span class="dir-tag short">SHORT</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">1.08907</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">1.09638</div>
            </div>
            <div>
                <div class="label">TP1</div>
                <div class="val tp1">1.08359</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2</div>
                    <div class="val tp2">1.07811</div>
                </div>
                <div class="age">3m ago <span class="status-dot dot-B"></span></div>
            </div>
        </div>

        <div class="sig class-C">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">BTC <span class="dir-tag long">LONG</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">63 110</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">62 486</div>
            </div>
            <div>
                <div class="label">TP1</div>
                <div class="val tp1">63 950</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2</div>
                    <div class="val tp2">65 200</div>
                </div>
                <div class="age">12m ago <span class="status-dot dot-C"></span></div>
            </div>
        </div>
    </div>

</body>
</html>
