<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Monitor 2.0</title>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #161920;
  --text: #e2e6f0;
  --muted: #8892a4;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  padding: 1rem;
  min-height: 100vh;
}
.wrap { max-width: 620px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; }
.status {
  padding: 14px 18px;
  background: var(--bg2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 15px 0;
  font-size: 15px;
}
.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
}
.dot.live { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.cards { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--bg2);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid #333;
}
.card.long { border-color: var(--green); }
.card.short { border-color: var(--red); }
.card.forming { border-color: var(--amber); }
.name { font-size: 18px; font-weight: 600; }
.price { font-size: 17px; float: right; }
.conf { margin: 10px 0 6px; font-size: 15px; font-weight: 500; }
.badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-top: 4px;
}
.b-long { background: rgba(16,185,129,0.25); color: var(--green); }
.b-short { background: rgba(239,68,68,0.25); color: var(--red); }
.b-forming { background: rgba(245,158,11,0.25); color: var(--amber); }
.log {
  margin-top: 30px;
  background: var(--bg2);
  border-radius: 12px;
  padding: 16px;
  font-size: 13.5px;
  max-height: 280px;
  overflow-y: auto;
}
button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  margin: 10px 0 20px;
  cursor: pointer;
}
.start-btn { background: var(--green); color: white; }
.stop-btn { background: var(--red); color: white; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Trading Monitor 2.0</h1>
  <p style="color:var(--muted)">US500 • GOLD • EUR/USD — 8:00–24:00</p>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status">Gotowy — kliknij Start Monitoring</span>
  </div>

  <button id="mainBtn" class="start-btn" onclick="toggleMonitor()">▶ Start Monitoring</button>

  <div class="cards" id="cards"></div>

  <div class="log" id="log">
    <div style="color:var(--muted);text-align:center;padding:20px">Log sygnałów będzie się tutaj pojawiał</div>
  </div>

  <p style="text-align:center;margin-top:40px;font-size:12px;color:#555">
    System 2.0 • Confidence Score + ADX + News Block<br>
    Tylko konto demo • Decyzja należy do Ciebie
  </p>
</div>
