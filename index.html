<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANT OS · CONSOLE</title>
    <style>
        :root {
            --bg: #0d0f14; --card: #161920; --border: #242933;
            --text: #e2e8f0; --muted: #64748b;
            --green: #10b981; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            letter-spacing: -0.02em; 
        }
        
        /* Header & Macro Guard */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 24px; 
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .logo { 
            font-weight: 900; 
            font-size: 14px; 
            color: var(--blue); 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
        }
        
        .macro-status { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--green); 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 700; 
            border: 1px solid rgba(16, 185, 129, 0.2); 
        }
        
        .macro-alert { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--red); 
            border-color: rgba(239, 68, 68, 0.2); 
        }

        /* Signal Board */
        .grid { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .sig { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr; 
            align-items: center; 
            transition: 0.2s; 
            position: relative; 
            overflow: hidden;
        }
        
        /* Side Indicators (Traffic Lights) */
        .sig.class-A { border-left: 4px solid var(--green); }
        .sig.class-B { border-left: 4px solid var(--amber); }
        .sig.class-C { border-left: 4px solid var(--muted); opacity: 0.5; }

        /* Typography */
        .label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        
        .asset { font-size: 22px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .dir-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .long { background: rgba(16,185,129,0.15); color: var(--green); }
        .short { background: rgba(239,68,68,0.15); color: var(--red); }
        
        .val { font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 700; }
        .tp1 { color: var(--green); }
        .tp2 { color: var(--muted); font-size: 15px; } 
        .sl { color: var(--red); }
        
        .age-box { text-align: right; }
        .age { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 4px; }
        
        .status-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            display: inline-block; 
            margin-left: 6px; 
        }
        .dot-A { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .dot-B { background: var(--amber); }
        .dot-C { background: var(--muted); }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .sig { 
                grid-template-columns: 1fr 1fr; 
                gap: 20px; 
            }
            .age-box { 
                grid-column: span 2; 
                text-align: left; 
                border-top: 1px solid var(--border); 
                padding-top: 15px; 
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .age { margin-top: 0; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">Quant OS · Console</div>
        <div id="macro-guard" class="macro-status">🟢 CLEAR — no events</div>
    </div>

    <div class="grid" id="signal-board">
        
        <div class="sig class-A">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">US500 <span class="dir-tag short">SHORT</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">5219.9</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">5242.8</div>
            </div>
            <div>
                <div class="label">TP1 (Target)</div>
                <div class="val tp1">5202.6</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2 (Bonus)</div>
                    <div class="val tp2">5185.4</div>
                </div>
                <div class="age">[1m ago] <span class="status-dot dot-A"></span></div>
            </div>
        </div>

        <div class="sig class-B">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">EURUSD <span class="dir-tag short">SHORT</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">1.08907</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">1.09638</div>
            </div>
            <div>
                <div class="label">TP1</div>
                <div class="val tp1">1.08359</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2</div>
                    <div class="val tp2">1.07811</div>
                </div>
                <div class="age">[3m ago] <span class="status-dot dot-B"></span></div>
            </div>
        </div>

        <div class="sig class-C">
            <div>
                <div class="label">Instrument</div>
                <div class="asset">BTC <span class="dir-tag long">LONG</span></div>
            </div>
            <div>
                <div class="label">Entry</div>
                <div class="val">63 110</div>
            </div>
            <div>
                <div class="label">SL</div>
                <div class="val sl">62 486</div>
            </div>
            <div>
                <div class="label">TP1</div>
                <div class="val tp1">63 950</div>
            </div>
            <div class="age-box">
                <div>
                    <div class="label">TP2</div>
                    <div class="val tp2">65 200</div>
                </div>
                <div class="age">[12m ago] <span class="status-dot dot-C"></span></div>
            </div>
        </div>

    </div>

    <script>
        // Logika Macro Guard - do spięcia z Twoim kalendarzem
        function setMacroStatus(minutesRemaining) {
            const el = document.getElementById('macro-guard');
            if (minutesRemaining <= 15) {
                el.className = "macro-status macro-alert";
                el.innerText = `⚠️ MACRO EVENT IN ${minutesRemaining} MIN`;
            } else {
                el.className = "macro-status";
                el.innerText = `🟢 CLEAR — next event in ${minutesRemaining} min`;
            }
        }

        // Symulacja: 45 min do danych
        setMacroStatus(45);
    </script>
</body>
</html>
