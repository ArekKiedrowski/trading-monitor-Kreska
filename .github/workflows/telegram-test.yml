name: Telegram Test Message

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send test message to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ]; then
            echo "Brak TG_BOT_TOKEN w secrets!"
            exit 1
          fi

          if [ -z "$TG_CHAT_ID" ]; then
            echo "Brak TG_CHAT_ID w secrets!"
            exit 1
          fi

          TS="$(date +'%Y-%m-%d %H:%M:%S')"

          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=✅ Test z GitHub Actions
Czas: ${TS}
Repo: $GITHUB_REPOSITORY")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.txt

          grep '"ok":true' response.txt >/dev/null || exit 1
