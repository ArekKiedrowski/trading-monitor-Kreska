name: Telegram Test Message

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send test message to Telegram
        env:
          TG_WEBHOOK: ${{ secrets.TG_WEBHOOK }}
        run: |
          if [ -z "$TG_WEBHOOK" ]; then
            echo "Brak TG_WEBHOOK w secrets!"
            exit 1
          fi

          TS="$(date +'%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "$TG_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"✅ Test z GitHub Actions\nCzas: ${TS}\nRepo: $GITHUB_REPOSITORY\"}"
