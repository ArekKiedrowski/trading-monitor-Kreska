name: Telegram Test Message

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send test message to Telegram
        env:
          TG_WEBHOOK: ${{ secrets.TG_WEBHOOK }}
        run: |
          if [ -z "$TG_WEBHOOK" ]; then
            echo "Brak TG_WEBHOOK w secrets!"
            exit 1
          fi

          TS="$(date +'%Y-%m-%d %H:%M:%S')"

          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$TG_WEBHOOK" \
            --data-urlencode "text=✅ Test z GitHub Actions\nCzas: ${TS}\nRepo: $GITHUB_REPOSITORY")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "RESPONSE:"
          cat response.txt

          grep '"ok":true' response.txt >/dev/null || exit 1
