name: Telegram Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ]; then
            echo "Brak TG_BOT_TOKEN w secrets!"
            exit 1
          fi
          if [ -z "$TG_CHAT_ID" ]; then
            echo "Brak TG_CHAT_ID w secrets!"
            exit 1
          fi
          TS="$(date +'%Y-%m-%d %H:%M:%S')"
          MSG="✅ Test z GitHub Actions | Czas: ${TS} | Repo: $GITHUB_REPOSITORY"
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}")
          echo "HTTP_CODE=$HTTP_CODE"
          echo "RESPONSE_START"
          cat response.txt
          echo
          echo "RESPONSE_END"
