const https = require('https');
const fs = require('fs');

// ================= CONFIG =================
const TG_TOKEN = process.env.TG_TOKEN;
const TG_CHAT_ID = process.env.TG_CHAT_ID;
const ACCOUNT_BALANCE = parseFloat(process.env.ACCOUNT_BALANCE || 10000);

const TG_THREADS = { SETUP: 2, TRADE: 3, SYSTEM: 4 };

const INSTRUMENTS = [
  { key: 'btc', name: 'BTC', sym: 'BTC-USD', dec: 2, minRR: 4, market: 'CRYPTO' },
  { key: 'tsla', name: 'TSLA', sym: 'TSLA', dec: 2, minRR: 4, market: 'TECH' },
  { key: 'nvda', name: 'NVDA', sym: 'NVDA', dec: 2, minRR: 4, market: 'TECH' },
  { key: 'goog', name: 'GOOG', sym: 'GOOG', dec: 2, minRR: 3, market: 'TECH' }
];

// ================= CACHE =================
let cache = { pendingSetups: {}, activePositions: {} };

try {
  if (fs.existsSync('signal-cache.json')) {
    cache = JSON.parse(fs.readFileSync('signal-cache.json', 'utf8'));
  }
} catch {
  cache = { pendingSetups: {}, activePositions: {} };
}

// ================= HELPERS =================
function log(msg) {
  const t = new Date().toISOString().replace('T', ' ').slice(0, 19);
  console.log(`[${t}] ${msg}`);
}

function money(v, d = 2) {
  return Number(v).toFixed(d);
}

// ================= TELEGRAM =================
async function sendTG(type, message) {
  if (!TG_TOKEN || !TG_CHAT_ID) return;

  const body = JSON.stringify({
    chat_id: TG_CHAT_ID,
    message_thread_id: TG_THREADS[type],
    text: message,
    parse_mode: 'HTML'
  });

  const opts = {
    hostname: 'api.telegram.org',
    path: `/bot${TG_TOKEN}/sendMessage`,
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Content-Length': Buffer.byteLength(body)
    }
  };

  return new Promise(res => {
    const req = https.request(opts, () => res());
    req.on('error', () => res());
    req.write(body);
    req.end();
  });
}

async function notify(type, message, instr) {
  log(`[${instr}] ${message.replace(/<[^>]*>/g, '')}`);
  await sendTG(type, message);
}

// ================= DATA =================
async function fetchYahoo(sym) {
  return new Promise((resolve, reject) => {
    https.get(
      `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1h&range=60d`,
      res => {
        let d = '';
        res.on('data', c => (d += c));
        res.on('end', () => {
          try {
            const json = JSON.parse(d);
            if (!json.chart || !json.chart.result || !json.chart.result[0]) {
              return reject(new Error('No Yahoo data'));
            }
            resolve(json.chart.result[0]);
          } catch (e) {
            reject(e);
          }
        });
      }
    ).on('error', reject);
  });
}

function candlesFromRaw(r) {
  const q = r.indicators.quote[0];
  const t = r.timestamp;
  const out = [];

  for (let i = 0; i < t.length; i++) {
    if (
      q.open[i] !== null &&
      q.high[i] !== null &&
      q.low[i] !== null &&
      q.close[i] !== null
    ) {
      out.push({
        t: t[i],
        o: q.open[i],
        h: q.high[i],
        l: q.low[i],
        c: q.close[i]
      });
    }
  }

  return out;
}

// ================= INDICATORS =================
function ema(data, period) {
  if (!data || data.length === 0) return null;

  const k = 2 / (period + 1);
  let val = data[0];

  for (let i = 1; i < data.length; i++) {
    val = data[i] * k + val * (1 - k);
  }

  return val;
}

function atr(highs, lows, closes, p = 14) {
  if (closes.length < p + 2) return null;

  let trs = [];

  for (let i = 1; i < closes.length; i++) {
    trs.push(
      Math.max(
        highs[i] - lows[i],
        Math.abs(highs[i] - closes[i - 1]),
        Math.abs(lows[i] - closes[i - 1])
      )
    );
  }

  const last = trs.slice(-p);
  return last.reduce((a, b) => a + b, 0) / p;
}

// ================= BASIC LOGIC =================
function detectTrend(candles) {
  const closes = candles.map(x => x.c);

  if (closes.length < 220) return false;

  const ema50 = ema(closes.slice(-80), 50);
  const ema200 = ema(closes.slice(-240), 200);
  const price = closes.at(-1);

  return price > ema50 && ema50 > ema200;
}

function detectBoneZone(candles) {
  const closes = candles.map(x => x.c);
  const price = closes.at(-1);

  const ema9 = ema(closes.slice(-30), 9);
  const ema20 = ema(closes.slice(-50), 20);

  if (!ema9 || !ema20) return false;

  return price <= ema9 * 1.01 && price >= ema20 * 0.99;
}

function detectTrigger(candles) {
  if (candles.length < 3) return false;

  const prevHigh = candles.at(-2).h;
  const last = candles.at(-1);

  const body = Math.abs(last.c - last.o);
  const range = last.h - last.l;

  if (range === 0) return false;

  const bodyRatio = body / range;

  return last.c > prevHigh && bodyRatio > 0.45 && last.c > last.o;
}

// ================= PRO FILTERS =================
function isExtendedMove(candles, atrVal) {
  if (!atrVal || candles.length < 8) return false;

  const last = candles.at(-1).c;
  const prev5 = candles.at(-6).c;

  const move = last - prev5;

  return move > atrVal * 1.4;
}

function isNearEMAZone(candles) {
  const closes = candles.map(x => x.c);
  const price = closes.at(-1);

  const ema9 = ema(closes.slice(-30), 9);
  const ema20 = ema(closes.slice(-50), 20);

  if (!ema9 || !ema20) return false;

  return price <= ema9 * 1.005 && price >= ema20 * 0.995;
}

function hasPullbackStructure(candles) {
  const last5 = candles.slice(-5);

  const redCandles = last5.filter(c => c.c < c.o).length;
  const lowerCloses = last5.filter((c, i, arr) => {
    if (i === 0) return false;
    return c.c < arr[i - 1].c;
  }).length;

  return redCandles >= 2 || lowerCloses >= 2;
}

function validateProEntry(candles, atrVal) {
  const extended = isExtendedMove(candles, atrVal);
  const nearEMA = isNearEMAZone(candles);
  const pullback = hasPullbackStructure(candles);

  if (extended) {
    return { ok: false, reason: 'AFTER IMPULSE / TOO LATE' };
  }

  if (!nearEMA) {
    return { ok: false, reason: 'NO EMA PULLBACK ZONE' };
  }

  if (!pullback) {
    return { ok: false, reason: 'NO REAL PULLBACK' };
  }

  return { ok: true, reason: 'PRO PULLBACK CONFIRMED' };
}

// ================= POSITION SIZE =================
function calcSize(balance, risk, entry, sl) {
  const riskUSD = balance * risk;
  const riskPerUnit = Math.abs(entry - sl);

  if (riskPerUnit <= 0) {
    return { size: 0, value: 0, riskUSD };
  }

  const size = riskUSD / riskPerUnit;

  return {
    size,
    value: size * entry,
    riskUSD
  };
}

// ================= SCORE =================
function scoreSetup({ trend, bone, trigger, pro }) {
  let s = 0;

  if (trend) s += 30;
  if (bone) s += 25;
  if (trigger) s += 25;
  if (pro.ok) s += 20;

  return s;
}

function gradeFromScore(score) {
  if (score >= 85) return { grade: 'A+', risk: 0.02 };
  if (score >= 70) return { grade: 'A', risk: 0.01 };
  if (score >= 55) return { grade: 'WATCH', risk: 0 };
  return { grade: 'INVALID', risk: 0 };
}

function isDuplicateSetup(instr, price) {
  const existing = cache.pendingSetups[instr.key];

  if (!existing) return false;

  const diff = Math.abs(existing.entry - price) / price;

  return diff < 0.002;
}

// ================= CORE =================
async function scan(instr) {
  const raw = await fetchYahoo(instr.sym);
  const candles = candlesFromRaw(raw);

  if (candles.length < 220) {
    log(`[SKIP] ${instr.name} | Not enough candles`);
    return;
  }

  const closes = candles.map(c => c.c);
  const highs = candles.map(c => c.h);
  const lows = candles.map(c => c.l);

  const atrVal = atr(highs, lows, closes);
  const price = closes.at(-1);

  if (!atrVal) {
    log(`[SKIP] ${instr.name} | No ATR`);
    return;
  }

  const trend = detectTrend(candles);
  const bone = detectBoneZone(candles);
  const trigger = detectTrigger(candles);
  const pro = validateProEntry(candles, atrVal);

  const score = scoreSetup({ trend, bone, trigger, pro });
  const { grade, risk } = gradeFromScore(score);

  log(
    `[SCAN] ${instr.name} | Score ${score} | ${grade} | Trend:${trend} Bone:${bone} Trigger:${trigger} PRO:${pro.reason}`
  );

  if (!trend) {
    log(`[SKIP] ${instr.name} | NO TREND`);
    return;
  }

  if (!pro.ok) {
    log(`[SKIP PRO] ${instr.name} | ${pro.reason}`);
    return;
  }

  if (!trigger) {
    log(`[WATCH] ${instr.name} | Pullback OK, waiting for trigger`);
    return;
  }

  if (grade === 'INVALID' || risk <= 0) {
    log(`[SKIP] ${instr.name} | Grade ${grade}, risk ${risk}`);
    return;
  }

  if (isDuplicateSetup(instr, price)) {
    log(`[SKIP] ${instr.name} | Duplicate setup`);
    return;
  }

  const sl = price - atrVal * 1.2;
  const tp = price + (price - sl) * instr.minRR;

  const pos = calcSize(ACCOUNT_BALANCE, risk, price, sl);

  await notify(
    'SETUP',
    `🚀 <b>${instr.name} LONG</b>
Grade: <b>${grade}</b>
Score: <b>${score}/100</b>

<b>PRO FILTER:</b>
${pro.reason}

<b>Entry:</b> ${money(price, instr.dec)}
<b>SL:</b> ${money(sl, instr.dec)}
<b>TP:</b> ${money(tp, instr.dec)}

<b>Risk:</b> ${(risk * 100).toFixed(1)}%
<b>Risk USD:</b> $${money(pos.riskUSD, 0)}
<b>Size:</b> ${money(pos.size, 4)}
<b>Value:</b> $${money(pos.value, 0)}

System O v5 PRO`,
    instr.name
  );

  cache.pendingSetups[instr.key] = {
    direction: 'LONG',
    entry: price,
    sl,
    tp,
    grade,
    score,
    risk,
    createdAt: new Date().toISOString()
  };
}

// ================= MAIN =================
async function main() {
  log('--- SYSTEM O v5 PRO START ---');

  for (const instr of INSTRUMENTS) {
    process.stdout.write(`[SCANNING] ${instr.name}... `);

    try {
      await scan(instr);
      process.stdout.write('DONE\n');
    } catch (e) {
      process.stdout.write('FAIL\n');
      log(`[ERROR] ${instr.name} | ${e.message || e}`);
    }
  }

  fs.writeFileSync('signal-cache.json', JSON.stringify(cache, null, 2));

  log('--- SYSTEM O v5 PRO END ---');
}

main();
