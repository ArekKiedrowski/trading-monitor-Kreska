// --- KONFIGURACJA SYSTEMOWA ---
const MAX_EXPOSURE = 1.0;           // Hard cap: 1x equity
const ACCOUNT_BALANCE = 10000;      // Fallback, real value najlepiej z GHA secrets / ENV

const TD_KEY = process.env.TD_KEY;
