  SETUP: Number(process.env.TG_THREAD_SETUPS || '2'),
  TRADE: Number(process.env.TG_THREAD_TRADES || '3'),
  SYSTEM: Number(process.env.TG_THREAD_SYSTEM || '4'),
};
const isManual = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';

// --- INSTRUMENTY ---
const INSTRUMENTS = [
  {key:'us500',  name:'US500',  sym:'ES=F',    src:'yahoo', sl:20,     tp:40,     dec:1, lot:0.05,  atrPctMin:0.15, adxMin:22},
  {key:'btc',    name:'BTC',    sym:'BTC-USD', src:'yahoo', sl:500,    tp:1500,   dec:0, lot:0.001, atrPctMin:0.50, adxMin:18},
  {key:'gold',   name:'GOLD',   sym:'XAU/USD', src:'td',    sl:25,     tp:50,     dec:1, lot:0.05,  atrPctMin:0.20, adxMin:20},
  {key:'eurusd', name:'EURUSD', sym:'EUR/USD', src:'td',    sl:0.0015, tp:0.003,  dec:5, lot:0.05,  atrPctMin:0.10, adxMin:18}
];

// --- CACHE ---
let cache = {};
try {
  if (fs.existsSync('signal-cache.json')) {
    cache = JSON.parse(fs.readFileSync('signal-cache.json', 'utf8'));
    console.log('Cache loaded');
  }
} catch (e) {
