name: Trading Monitor Scan

on:
  schedule:
    - cron: '*/5 6-22 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: signal-cache.json
          key: signals-${{ github.run_id }}
          restore-keys: |
            signals-

      - name: Scan markets and send Telegram
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const TD_KEY  = process.env.TD_KEY;
          const TG_TOKEN = process.env.TG_TOKEN;
          const TG_CHAT  = process.env.TG_CHAT;
          const isManual = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';

          const INSTRUMENTS = [
            {key:'us500', name:'US500',   sym:'^GSPC',   src:'yahoo', sl:20,     tp:40,    dec:1, lot:0.05, rsiOB:70, rsiOS:30, atrPctMin:0.15, adxMin:22, atrSlMult:0.8,  atrTpMult:2.0, srBuffer:0.0, scalpAtrMax:25,    scalpLot:0.03},
            {key:'gold',  name:'GOLD',    sym:'XAU/USD', src:'td',    sl:25,     tp:50,    dec:1, lot:0.05, rsiOB:68, rsiOS:32, atrPctMin:0.20, adxMin:20, atrSlMult:1.0,  atrTpMult:2.2, srBuffer:0.3, scalpAtrMax:18,    scalpLot:0.03},
            {key:'eurusd',name:'EUR/USD', sym:'EUR/USD', src:'td',    sl:0.0015, tp:0.003, dec:5, lot:0.05, rsiOB:65, rsiOS:35, atrPctMin:0.10, adxMin:18, atrSlMult:0.7,  atrTpMult:1.8, srBuffer:0.0, scalpAtrMax:0.001, scalpLot:0.03}
          ];

          // ─── STATE ─────────────────────────────────────────────────
          let cache = {};
          try {
            if (fs.existsSync('signal-cache.json')) {
              cache = JSON.parse(fs.readFileSync('signal-cache.json', 'utf8'));
              console.log('Cache loaded:', JSON.stringify(cache).slice(0, 200));
            }
          } catch(e) { console.log('No cache'); }
          if (isManual) { cache = {}; console.log('Manual - cache cleared'); }
          if (!cache.dailyLog) cache.dailyLog = [];

          // ─── HTTP ──────────────────────────────────────────────────
          function fetchUrl(url, retries = 2) {
            return new Promise((resolve, reject) => {
              const attempt = (n) => {
                https.get(url, {headers: {'User-Agent': 'Mozilla/5.0'}}, res => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    try { resolve(JSON.parse(data)); }
                    catch(e) {
                      if (n > 0) setTimeout(() => attempt(n-1), 3000);
                      else reject(new Error('parse: ' + data.slice(0,80)));
                    }
                  });
                }).on('error', e => {
                  if (n > 0) setTimeout(() => attempt(n-1), 3000);
                  else reject(e);
                });
              };
              attempt(retries);
            });
          }

          function sendTG(msg) {
            const body = JSON.stringify({chat_id: TG_CHAT, text: msg, parse_mode: 'HTML'});
            const opts = {
              hostname: 'api.telegram.org',
              path: `/bot${TG_TOKEN}/sendMessage`,
              method: 'POST',
              headers: {'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)}
            };
            return new Promise(resolve => {
              const req = https.request(opts, res => {
                let d=''; res.on('data',c=>d+=c); res.on('end',()=>{console.log('TG:',d.slice(0,100));resolve();});
              });
              req.on('error', e => {console.error('TG err:',e.message);resolve();});
              req.write(body); req.end();
            });
          }

          // ─── MATH ──────────────────────────────────────────────────
          function ema(d, p) {
            if (d.length < p) return null;
            const k = 2/(p+1);
            let e = d.slice(0,p).reduce((a,b)=>a+b,0)/p;
            for (let i=p;i<d.length;i++) e = d[i]*k+e*(1-k);
            return e;
          }
          function rsiFn(c, p=14) {
            if (c.length<p+1) return null;
            let g=0,l=0;
            for (let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
            const ag=g/p,al=l/p; if(al===0)return 100; return 100-(100/(1+ag/al));
          }
          function atrFn(h,l,c,p=14) {
            if(c.length<p+1)return null;
            const t=[];
            for(let i=1;i<c.length;i++)t.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
            return t.slice(-p).reduce((a,b)=>a+b,0)/p;
          }
          function adxFn(h,l,c,p=14) {
            if(c.length<p*2)return null;
            const dms=[],dmm=[],trl=[];
            for(let i=1;i<c.length;i++){
              const up=h[i]-h[i-1],dn=l[i-1]-l[i];
              dms.push(up>dn&&up>0?up:0); dmm.push(dn>up&&dn>0?dn:0);
              trl.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
            }
            let aS=trl.slice(0,p).reduce((a,b)=>a+b,0);
            let pS=dms.slice(0,p).reduce((a,b)=>a+b,0);
            let mS=dmm.slice(0,p).reduce((a,b)=>a+b,0);
            const dxl=[];
            for(let i=p;i<trl.length;i++){
              aS=aS-aS/p+trl[i];pS=pS-pS/p+dms[i];mS=mS-mS/p+dmm[i];
              const dp=aS>0?100*pS/aS:0,dm=aS>0?100*mS/aS:0;
              dxl.push(dp+dm>0?100*Math.abs(dp-dm)/(dp+dm):0);
            }
            if(dxl.length<p)return null;
            return dxl.slice(-p).reduce((a,b)=>a+b,0)/p;
          }
          function rocFn(c,p=8){
            if(c.length<p+1)return null;
            const cur=c[c.length-1],prev=c[c.length-1-p];
            return prev>0?(cur-prev)/prev*100:null;
          }
          function rollingCorr(a,b,p=20){
            if(a.length<p||b.length<p)return null;
            const sa=a.slice(-p),sb=b.slice(-p);
            const ma=sa.reduce((s,v)=>s+v,0)/p,mb=sb.reduce((s,v)=>s+v,0)/p;
            let cov=0,va=0,vb=0;
            for(let i=0;i<p;i++){cov+=(sa[i]-ma)*(sb[i]-mb);va+=(sa[i]-ma)**2;vb+=(sb[i]-mb)**2;}
            if(va===0||vb===0)return 0;
            return cov/Math.sqrt(va*vb);
          }

          // ─── S/R ENGINE ────────────────────────────────────────────
          function isSwingLow(l,idx,w=3){
            for(let i=idx-w;i<idx;i++)if(i>=0&&l[i]<=l[idx])return false;
            for(let i=idx+1;i<=idx+w;i++)if(i<l.length&&l[i]<=l[idx])return false;
            return true;
          }
          function isSwingHigh(h,idx,w=3){
            for(let i=idx-w;i<idx;i++)if(i>=0&&h[i]>=h[idx])return false;
            for(let i=idx+1;i<=idx+w;i++)if(i<h.length&&h[i]>=h[idx])return false;
            return true;
          }
          function countTouches(level,h,l,c,tol=0.002){
            const t=level*tol;let n=0;
            for(let i=0;i<c.length;i++)if(Math.abs(l[i]-level)<t||Math.abs(h[i]-level)<t||Math.abs(c[i]-level)<t)n++;
            return n;
          }
          function findBestSR(h,l,c,dir,atrVal,lookback=50){
            const price=c[c.length-1];
            const n=Math.min(lookback,c.length-4);
            const candidates=[];
            for(let i=3;i<n-3;i++){
              const idx=c.length-n+i;
              if(dir==='LONG'&&isSwingLow(l,idx,3)){
                const level=l[idx];
                if(level<price&&(price-level)<atrVal*3){
                  const touches=countTouches(level,h,l,c,0.002);
                  const quality=Math.min(100,Math.round(touches*25+(i/n)*35+(1-(price-level)/(atrVal*3))*40));
                  candidates.push({level,touches,quality,type:'support'});
                }
              }
              if(dir==='SHORT'&&isSwingHigh(h,idx,3)){
                const level=h[idx];
                if(level>price&&(level-price)<atrVal*3){
                  const touches=countTouches(level,h,l,c,0.002);
                  const quality=Math.min(100,Math.round(touches*25+(i/n)*35+(1-(level-price)/(atrVal*3))*40));
                  candidates.push({level,touches,quality,type:'resistance'});
                }
              }
            }
            if(!candidates.length)return null;
            return candidates.sort((a,b)=>b.quality-a.quality)[0];
          }
          function checkClearPath(h,l,c,entry,tp1,dir,atrVal){
            const minL=Math.min(entry,tp1),maxL=Math.max(entry,tp1);
            const tol=atrVal*0.3;let obstacles=0;
            const n=Math.min(50,c.length-4);
            for(let i=3;i<n-3;i++){
              const idx=c.length-n+i;
              if(isSwingHigh(h,idx,3)){const lv=h[idx];if(lv>minL+tol&&lv<maxL-tol)obstacles++;}
              if(isSwingLow(l,idx,3)){const lv=l[idx];if(lv>minL+tol&&lv<maxL-tol)obstacles++;}
            }
            return{clear:obstacles===0,obstacles};
          }
          function detectRecentLiqSweep(h,l,c,dir,lookback=3){
            const n=c.length;
            if(n<lookback+5)return false;
            const priorHigh=Math.max(...h.slice(n-lookback-10,n-lookback));
            const priorLow=Math.min(...l.slice(n-lookback-10,n-lookback));
            for(let i=n-lookback;i<n-1;i++){
              if(dir==='LONG'&&l[i]<priorLow&&c[i]>priorLow)return true;
              if(dir==='SHORT'&&h[i]>priorHigh&&c[i]<priorHigh)return true;
            }
            return false;
          }

          // ─── TIMEFRAME ANALYSIS ────────────────────────────────────
          function analyzeTrend(closes,highs,lows){
            if(!closes||closes.length<50)return{trend:'NEUTRAL'};
            const c=closes.slice(0,-1);
            const e20=ema(c,20),e50=ema(c,50);
            const price=c[c.length-1];
            if(e20>e50&&price>e50)return{trend:'UP',e20,e50};
            if(e20<e50&&price<e50)return{trend:'DOWN',e20,e50};
            return{trend:'NEUTRAL',e20,e50};
          }

          function analyzeH1(closes,highs,lows,instr){
            const c=closes.slice(0,-1),h=highs.slice(0,-1),l=lows.slice(0,-1);
            if(c.length<50)return{dir:'INSUFFICIENT'};
            const e20=ema(c,20),e50=ema(c,50);
            const e20p=ema(c.slice(0,-5),20),e50p=ema(c.slice(0,-5),50);
            const atrVal=atrFn(h,l,c,14),adxVal=adxFn(h,l,c,14);
            const rocVal=rocFn(c,8),rsiVal=rsiFn(c,14);
            const price=c[c.length-1];
            const atrPct=atrVal?(atrVal/price*100):0;
            const trendUp=e20>e50,trendDown=e20<e50;
            const tsUp=trendUp?(e20-e50)>(e20p-e50p):(e50-e20)>(e50p-e20p);
            const volOk=atrPct>=(instr.atrPctMin||0.15);
            const trendStrong=!adxVal||(adxVal>=(instr.adxMin||20));
            const aboveEMA=price>e20&&price>e50,belowEMA=price<e20&&price<e50;
            const mom=rocVal||0;
            const overextLong=atrVal&&(price>e20+2.5*atrVal);
            const overextShort=atrVal&&(price<e20-2.5*atrVal);
            const rsiOB=rsiVal&&rsiVal>(instr.rsiOB||68);
            const rsiOS=rsiVal&&rsiVal<(instr.rsiOS||32);
            let dir='NO_SIGNAL';const reasons=[];
            if(trendUp&&mom>0&&aboveEMA){
              if(tsUp&&volOk&&trendStrong&&!overextLong&&!rsiOB)dir='LONG';
              else{dir='FORMING';
                if(!tsUp)reasons.push('słaby trend');if(!volOk)reasons.push('niska vol');
                if(!trendStrong)reasons.push('ADX '+( adxVal?adxVal.toFixed(1):'?')+' za niski');
                if(overextLong)reasons.push('overextended');if(rsiOB)reasons.push('RSI wykupiony');}
            } else if(trendDown&&mom<0&&belowEMA){
              if(tsUp&&volOk&&trendStrong&&!overextShort&&!rsiOS)dir='SHORT';
              else{dir='FORMING';
                if(!tsUp)reasons.push('słaby trend');if(!volOk)reasons.push('niska vol');
                if(!trendStrong)reasons.push('ADX '+(adxVal?adxVal.toFixed(1):'?')+' za niski');
                if(overextShort)reasons.push('overextended');if(rsiOS)reasons.push('RSI wyprzedany');}
            }
            return{dir,e20,e50,atrVal,adxVal,rocVal,rsiVal,price,atrPct,
              overextended:dir==='LONG'?overextLong:overextShort,
              trendUp,trendDown,tsUp,volOk,trendStrong,reasons,closes:c,highs:h,lows:l};
          }

          // M15 — finalny filtr wejścia
          function analyzeM15(closes,highs,lows,dir){
            if(!closes||closes.length<22)return{confirmed:true,reason:'M15 brak danych'};
            const c=closes.slice(0,-1),h=highs.slice(0,-1),l=lows.slice(0,-1);
            const e9=ema(c,9),e21=ema(c,21),rsiVal=rsiFn(c,14);
            if(!e9||!e21)return{confirmed:true,reason:'M15 brak EMA'};
            if(dir==='LONG'){
              const ok=e9>e21&&(rsiVal===null||rsiVal>45);
              return{confirmed:ok,reason:ok?'M15 ✓':`M15 ✗ (EMA9${e9<e21?'<':'>'}EMA21, RSI ${rsiVal?rsiVal.toFixed(0):'?'})`};
            } else {
              const ok=e9<e21&&(rsiVal===null||rsiVal<55);
              return{confirmed:ok,reason:ok?'M15 ✓':`M15 ✗ (EMA9${e9>e21?'>':'<'}EMA21, RSI ${rsiVal?rsiVal.toFixed(0):'?'})`};
            }
          }

          // ─── CONFIDENCE SCORE ──────────────────────────────────────
          function calcConfidence({dir,adxVal,rocVal,rsiVal,atrPct,d1trend,h4trend,session,srQuality,overextended,dxyCorr,vix,instr,clearPath}){
            let score=0;const tags=[];
            // D1 (0-15)
            if(d1trend==='NEUTRAL'){score+=8;tags.push('D1 neu');}
            else if((dir==='LONG'&&d1trend==='UP')||(dir==='SHORT'&&d1trend==='DOWN')){score+=15;tags.push('D1 ✓');}
            else{score+=0;tags.push('D1 ✗');}
            // H4 (0-15)
            if(h4trend==='NEUTRAL'){score+=8;tags.push('H4 neu');}
            else if((dir==='LONG'&&h4trend==='UP')||(dir==='SHORT'&&h4trend==='DOWN')){score+=15;tags.push('H4 ✓');}
            else{score+=0;tags.push('H4 ✗');}
            // ADX (0-18)
            if(adxVal>=30){score+=18;tags.push('ADX '+adxVal.toFixed(1));}
            else if(adxVal>=(instr.adxMin||20)){score+=11;tags.push('ADX '+adxVal.toFixed(1));}
            else if(adxVal){score+=0;tags.push('ADX '+adxVal.toFixed(1)+' ✗');}
            // RSI (0-12)
            if(rsiVal){const mid=Math.abs(rsiVal-50);
              if(mid<15){score+=12;tags.push('RSI '+rsiVal.toFixed(1));}
              else if(mid<25){score+=6;tags.push('RSI '+rsiVal.toFixed(1));}
              else{score+=0;tags.push('RSI '+rsiVal.toFixed(1)+' ✗');}}
            // ROC (0-12)
            if(rocVal!==null&&rocVal!==undefined){
              const ok=(dir==='LONG'&&rocVal>0)||(dir==='SHORT'&&rocVal<0);
              if(ok&&Math.abs(rocVal)>0.3){score+=12;tags.push('ROC '+rocVal.toFixed(2)+'%');}
              else if(ok){score+=6;tags.push('ROC '+rocVal.toFixed(2)+'%');}
              else{score+=0;tags.push('ROC '+rocVal.toFixed(2)+'% ✗');}}
            // Session (0-8)
            if(session.overlap){score+=8;tags.push('Overlap');}
            else if(session.ny||session.london){score+=5;tags.push(session.ny?'NY':'London');}
            else{score+=1;tags.push('Off-sess');}
            // SR Quality (0-8)
            if(srQuality>=80){score+=8;tags.push('SR Q:'+srQuality);}
            else if(srQuality>=55){score+=5;tags.push('SR Q:'+srQuality);}
            else if(srQuality>0){score+=2;tags.push('SR Q:'+srQuality+' ✗');}
            else{tags.push('Brak SR');}
            // Clear path (0-7)
            if(clearPath===true){score+=7;tags.push('Droga czysta');}
            else if(clearPath===false){score+=0;tags.push('Przeszkoda TP1');}
            else score+=4;
            // Overextension (0-5)
            if(!overextended)score+=5;
            else tags.push('Overext ✗');
            // DXY correlation (0-5)
            if(dxyCorr!==null&&(instr.key==='gold'||instr.key==='us500')){
              const ok=(dir==='LONG'&&dxyCorr<-0.3)||(dir==='SHORT'&&dxyCorr>0.3)||Math.abs(dxyCorr)<0.2;
              score+=(ok?5:0);tags.push('DXY r='+dxyCorr.toFixed(2)+(ok?'':' ✗'));
            }else score+=5;
            // VIX (0-5)
            if(vix!==null&&instr.key==='us500'){
              if(vix<20){score+=5;tags.push('VIX '+vix.toFixed(1));}
              else if(vix<30){score+=3;tags.push('VIX '+vix.toFixed(1));}
              else{score+=0;tags.push('VIX '+vix.toFixed(1)+' ✗');}
            }else score+=5;
            score=Math.min(100,Math.max(0,score));
            const state=score>=78?'ACTIVE':score>=50?'FORMING':'FLAT';
            return{score,state,tags};
          }

          // ─── SESSION (Warsaw time) ─────────────────────────────────
          function getSession(){
            const now=new Date();
            const month=now.getUTCMonth(); // 0-based
            const offset=(month>=3&&month<=9)?2:1; // CEST=+2, CET=+1
            const wMs=now.getTime()+offset*3600000;
            const w=new Date(wMs);
            const h=w.getUTCHours(),m=w.getUTCMinutes();
            const total=h*60+m;
            const str=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
            return{
              h,m,total,str,offset,
              asian:total>=120&&total<540,
              london:total>=540&&total<720,
              ny:total>=900&&total<1080,
              overlap:total>=900&&total<1020,
              active:h>=6&&h<23,
              isDailySummary:total>=1310&&total<1320  // 21:50-22:00 Warsaw
            };
          }

          // ─── NEWS BLOCKING ─────────────────────────────────────────
          const NEWS_RULES={
            us500:{keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','ISM','Unemployment','Retail Sales','PPI'],countries:['USD'],impacts:['High','Medium']},
            gold: {keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','Interest Rate','Inflation','PPI'],countries:['USD'],impacts:['High']},
            eurusd:{keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','ISM','ECB','Interest Rate','PMI','Inflation','Unemployment'],countries:['USD','EUR'],impacts:['High','Medium']}
          };
          function isBlocking(ev,key){
            const rule=NEWS_RULES[key];
            if(!rule||!rule.countries.includes(ev.country))return false;
            if(!rule.impacts.includes(ev.impact))return false;
            if(ev.impact==='High')return true;
            return rule.keywords.some(k=>ev.title&&ev.title.toLowerCase().includes(k.toLowerCase()));
          }
          async function getNewsBlocked(session){
            const blocked={us500:false,gold:false,eurusd:false};
            try{
              const d=await fetchUrl('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
              const todayStr=new Date().toISOString().split('T')[0];
              d.forEach(e=>{
                if(!e.date)return;
                const evDate=new Date(e.date);
                if(evDate.toISOString().split('T')[0]!==todayStr)return;
                const evH=evDate.getUTCHours()+session.offset;
                const evMin=evH*60+evDate.getUTCMinutes();
                if(Math.abs(evMin-session.total)>30)return;
                ['us500','gold','eurusd'].forEach(key=>{
                  if(isBlocking(e,key)){blocked[key]=true;console.log(`NEWS BLOCK ${key}: ${e.title}`);}
                });
              });
            }catch(e){console.log('Calendar failed - allowing signals');}
            return blocked;
          }

          // ─── DATA FETCHING ─────────────────────────────────────────
          async function fetchYahoo(sym){
            const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1h&range=30d`;
            const d=await fetchUrl(url);
            const res=d.chart.result[0];
            const closes=res.indicators.quote[0].close.filter(v=>v!=null);
            const highs=res.indicators.quote[0].high.filter(v=>v!=null);
            const lows=res.indicators.quote[0].low.filter(v=>v!=null);
            return{closes,highs,lows,price:res.meta.regularMarketPrice,prev:res.meta.previousClose};
          }
          async function fetchTD(sym,interval='1h',outputsize=100){
            await new Promise(r=>setTimeout(r,600));
            const url=`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=${interval}&outputsize=${outputsize}&apikey=${TD_KEY}`;
            const d=await fetchUrl(url);
            if(d.status==='error')throw new Error(d.message);
            if(!d.values||d.values.length<2)throw new Error('brak danych TD');
            const values=d.values;
            const closes=values.map(v=>parseFloat(v.close)).reverse();
            const highs=values.map(v=>parseFloat(v.high)).reverse();
            const lows=values.map(v=>parseFloat(v.low)).reverse();
            return{closes,highs,lows,price:parseFloat(values[0].close),prev:parseFloat(values[1].close)};
          }
          async function fetchVIX(){
            try{const d=await fetchYahoo('%5EVIX');return d.price;}catch(e){return null;}
          }
          async function fetchDXY(){
            try{return await fetchYahoo('UUP');}catch(e){return null;}
          }

          // ─── MAIN ──────────────────────────────────────────────────
          async function main(){
            const session=getSession();
            const sessLabel=session.overlap?'Overlap ⚡':session.ny?'NY Open':session.london?'London':session.asian?'Azja':'Off-session';
            console.log(`Warsaw: ${session.str} | ${sessLabel} | UTC+${session.offset}`);

            // Daily summary o ~21:50 Warsaw
            if(session.isDailySummary){
              const log=cache.dailyLog||[];
              if(log.length>0){
                const actives=log.filter(s=>s.type==='ACTIVE').length;
                const formings=log.filter(s=>s.type==='FORMING').length;
                let msg=`📊 <b>Podsumowanie dnia — ${session.str}</b>\n\n`;
                msg+=`✅ Sygnały ACTIVE: <b>${actives}</b>\n`;
                msg+=`⏳ Sygnały FORMING: <b>${formings}</b>\n\n`;
                const uniq=[...new Map(log.map(s=>[s.instr+s.type+s.dir,s])).values()];
                uniq.slice(0,12).forEach(s=>{ msg+=`${s.time} · ${s.instr} · ${s.type} · ${s.dir} [${s.score}]\n`; });
                await sendTG(msg);
                console.log('Daily summary sent');
              } else {
                await sendTG(`📊 <b>Koniec dnia — ${session.str}</b>\nBrak sygnałów dzisiaj.`);
              }
              cache.dailyLog=[];
              fs.writeFileSync('signal-cache.json',JSON.stringify(cache));
              return;
            }

            if(!session.active){console.log('Poza godzinami');return;}

            // Stall detection — alert jeśli brak skanu przez >35 min
            const lastScan=cache.lastScanTime||0;
            const nowMs=Date.now();
            if(lastScan>0&&(nowMs-lastScan)>35*60*1000&&!isManual){
              await sendTG(`⚠️ <b>Trading Monitor</b>: brak skanu przez 35+ minut!\nSprawdź GitHub Actions.`);
            }
            cache.lastScanTime=nowMs;

            // Context
            const[newsBlocked,vix,dxyData]=await Promise.all([getNewsBlocked(session),fetchVIX(),fetchDXY()]);
            const dxyCloses=dxyData?dxyData.closes:[];
            console.log(`VIX: ${vix?vix.toFixed(1):'n/a'} | DXY closes: ${dxyCloses.length}`);

            const messages=[];
            const newCache={...cache};
            if(!newCache.dailyLog)newCache.dailyLog=[];

            for(const instr of INSTRUMENTS){
              if(newsBlocked[instr.key]){
                console.log(`SKIP ${instr.name} - news block`);
                continue;
              }
              try{
                // H1
                const data=instr.src==='yahoo'?await fetchYahoo(instr.sym):await fetchTD(instr.sym,'1h',100);
                const{closes,highs,lows,price,prev}=data;
                const h1=analyzeH1(closes,highs,lows,instr);
                if(h1.dir==='INSUFFICIENT'){console.log(`${instr.name}: INSUFFICIENT`);continue;}

                // D1 + H4
                let d1={trend:'NEUTRAL'},h4={trend:'NEUTRAL'};
                if(instr.src==='td'){
                  try{await new Promise(r=>setTimeout(r,500));const d=await fetchTD(instr.sym,'1day',60);d1=analyzeTrend(d.closes,d.highs,d.lows);}catch(e){console.log(instr.name,'D1:',e.message);}
                  try{await new Promise(r=>setTimeout(r,500));const d=await fetchTD(instr.sym,'4h',60);h4=analyzeTrend(d.closes,d.highs,d.lows);}catch(e){console.log(instr.name,'H4:',e.message);}
                }

                // DXY correlation
                let dxyCorr=null;
                if(dxyCloses.length>=20&&closes.length>=20)dxyCorr=rollingCorr(dxyCloses,closes,20);

                // S/R
                let srResult=null;
                if(h1.atrVal){
                  const srDir=(h1.dir==='LONG'||h1.trendUp)?'LONG':'SHORT';
                  srResult=findBestSR(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),srDir,h1.atrVal,50);
                }

                const confDir=h1.dir==='LONG'?'LONG':h1.dir==='SHORT'?'SHORT':h1.trendUp?'LONG':'SHORT';

                // Clear path (wstępnie null, uzupełnimy po wyliczeniu entry)
                let clearPath=null;

                const conf=calcConfidence({
                  dir:confDir,adxVal:h1.adxVal||0,rocVal:h1.rocVal,rsiVal:h1.rsiVal,
                  atrPct:h1.atrPct,d1trend:d1.trend,h4trend:h4.trend,session,
                  srQuality:srResult?srResult.quality:0,
                  overextended:h1.overextended||false,dxyCorr,vix,instr,clearPath
                });

                const chg=prev?((price-prev)/prev*100):0;
                console.log(`${instr.name} | ${h1.dir} | ${price.toFixed(instr.dec)} (${chg>=0?'+':''}${chg.toFixed(2)}%) | D1:${d1.trend} H4:${h4.trend} | ADX:${h1.adxVal?h1.adxVal.toFixed(1):'?'} RSI:${h1.rsiVal?h1.rsiVal.toFixed(1):'?'} | Score:${conf.score} | ${sessLabel}`);

                // ── SYGNAŁ KIERUNKOWY ─────────────────────────────────
                if(h1.dir==='LONG'||h1.dir==='SHORT'){
                  const isL=h1.dir==='LONG';
                  const atr=h1.atrVal||instr.sl;

                  // Entry/SL/TP
                  let ep;
                  if(srResult&&srResult.quality>=55){
                    ep=parseFloat((isL?srResult.level-(instr.srBuffer*atr):srResult.level+(instr.srBuffer*atr)).toFixed(instr.dec));
                  }else{
                    ep=parseFloat(price.toFixed(instr.dec));
                  }
                  const sl=parseFloat((isL?ep-atr*instr.atrSlMult:ep+atr*instr.atrSlMult).toFixed(instr.dec));
                  const tp1=parseFloat((isL?ep+atr:ep-atr).toFixed(instr.dec));
                  const tp2=parseFloat((isL?ep+atr*instr.atrTpMult:ep-atr*instr.atrTpMult).toFixed(instr.dec));
                  const rr=Math.abs(tp2-ep)/Math.max(0.00001,Math.abs(sl-ep));

                  // Clear path (teraz mamy ep i tp1)
                  if(h1.atrVal){
                    const pr=checkClearPath(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),ep,tp1,h1.dir,atr);
                    clearPath=pr.clear;
                    if(clearPath)conf.score=Math.min(100,conf.score+7);
                    conf.tags.push(clearPath?'Droga czysta':'Przeszkoda TP1');
                  }

                  // M15
                  let m15={confirmed:true,reason:'(brak M15)'};
                  if(instr.src==='td'){
                    try{
                      await new Promise(r=>setTimeout(r,500));
                      const m15d=await fetchTD(instr.sym,'15min',50);
                      m15=analyzeM15(m15d.closes,m15d.highs,m15d.lows,h1.dir);
                    }catch(e){console.log(instr.name,'M15:',e.message);}
                  }

                  // Signal A/B
                  const recentSweep=detectRecentLiqSweep(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),h1.dir,3);
                  const calmATR=atr<=(instr.scalpAtrMax||20);
                  const isSignalA=conf.score>=78&&rr>=1.9&&m15.confirmed;
                  const isSignalB=conf.score>=85&&recentSweep&&calmATR&&rr>=1.2&&!isSignalA;
                  const isSignalAnoM15=conf.score>=78&&rr>=1.9&&!m15.confirmed;

                  const prevSignal=cache[instr.key+'_sig'];
                  const thisSig=isSignalA?'A':isSignalB?'B':isSignalAnoM15?'A_WAIT':'DIR';
                  const isNew=prevSignal!==thisSig;
                  newCache[instr.key+'_sig']=thisSig;
                  newCache[instr.key+'_score']=conf.score;

                  // Daily log
                  newCache.dailyLog.push({time:session.str,instr:instr.name,type:'ACTIVE',score:conf.score,dir:h1.dir});

                  if((isSignalA||isSignalB)&&isNew){
                    const lot=isSignalB?instr.scalpLot:instr.lot;
                    const label=isSignalA?'⚡ SYGNAŁ A':'🎯 SCALP B';
                    const isNear=Math.abs(price-ep)<atr*0.4;
                    const entryType=isNear?'RYNKOWE':'LIMIT';
                    const d1warn=(isL&&d1.trend==='DOWN')||(!isL&&d1.trend==='UP')?'\n⚠️ D1 niezgodny!':'';
                    const srTxt=srResult&&srResult.quality>=55?`📍 ${srResult.type} Q:${srResult.quality} (${srResult.touches} testy)\n`:'';
                    const pathTxt=clearPath===true?'✅ Droga czysta\n':clearPath===false?`⚠️ Przeszkoda na TP1\n`:'';
                    const sweepTxt=isSignalB?'🔄 Liquidity Sweep ✓ · ATR spokojny\n':'';

                    messages.push(
                      `${label} <b>${isL?'LONG ▲':'SHORT ▼'} ${instr.name}</b> [Score: ${conf.score}/100]\n`+
                      `Cena: ${price.toFixed(instr.dec)} (${chg>=0?'+':''}${chg.toFixed(2)}%)\n\n`+
                      `Entry (${entryType}): <b>${ep}</b>\n`+
                      `SL: <b>${sl}</b> · Lot: ${lot}\n`+
                      `TP1 (50%): <b>${tp1}</b> → SL na entry\n`+
                      `TP2 (50%): <b>${tp2}</b>\n`+
                      `R:R 1:${rr.toFixed(1)}\n\n`+
                      `D1: ${d1.trend} · H4: ${h4.trend} · ${m15.reason}\n`+
                      `VIX: ${vix?vix.toFixed(1):'—'} · ${sessLabel}\n`+
                      srTxt+pathTxt+sweepTxt+d1warn+
                      `\nFilters: ${conf.tags.join(' · ')}\n`+
                      `📌 TP1 → zamknij 50% → SL na entry`
                    );

                  } else if(isSignalAnoM15&&isNew){
                    messages.push(
                      `⏳ <b>PRAWIE A: ${isL?'LONG':'SHORT'} ${instr.name}</b> [Score: ${conf.score}]\n`+
                      `${m15.reason} — czekaj na potwierdzenie M15\n`+
                      `Entry docelowy: ${ep} · SL: ${sl} · TP1: ${tp1}\n`+
                      `D1: ${d1.trend} · H4: ${h4.trend} · R:R 1:${rr.toFixed(1)}\n`+
                      `VIX: ${vix?vix.toFixed(1):'—'} · ${sessLabel}`
                    );
                  }

                // ── FORMING ───────────────────────────────────────────
                } else if(h1.dir==='FORMING'){
                  const prevScore=cache[instr.key+'_score']||0;
                  const prevSig=cache[instr.key+'_sig'];
                  newCache[instr.key+'_score']=conf.score;
                  newCache[instr.key+'_sig']='FORMING';

                  newCache.dailyLog.push({time:session.str,instr:instr.name,type:'FORMING',score:conf.score,dir:h1.trendUp?'LONG?':'SHORT?'});

                  const rising=conf.score>prevScore+3;
                  const freshForming=prevSig!=='FORMING';
                  // Alert gdy score 65-77 i rosnący (lub właśnie wszedł w FORMING)
                  if(conf.score>=65&&conf.score<78&&(rising||freshForming)){
                    const brakuje=h1.reasons.length?h1.reasons.join(', '):'warunki niekompletne';
                    const arrow=rising?` ▲ (+${conf.score-prevScore})`:'';
                    messages.push(
                      `⏳ <b>FORMING ${h1.trendUp?'LONG':'SHORT'} ${instr.name}</b> [Score: ${conf.score}${arrow}]\n`+
                      `Czekam na: ${brakuje}\n`+
                      `D1: ${d1.trend} · H4: ${h4.trend} · ADX: ${h1.adxVal?h1.adxVal.toFixed(1):'?'} · RSI: ${h1.rsiVal?h1.rsiVal.toFixed(1):'?'}\n`+
                      `Obserwuj: ${(h1.e20||price).toFixed(instr.dec)} · ${sessLabel}\n`+
                      `VIX: ${vix?vix.toFixed(1):'—'}`
                    );
                  }
                } else {
                  newCache[instr.key+'_sig']='NO_SIGNAL';
                  newCache[instr.key+'_score']=0;
                }

              }catch(e){
                console.error(instr.name, e.message);
              }
            }

            // Zapisz cache
            fs.writeFileSync('signal-cache.json',JSON.stringify(newCache));
            console.log('Cache saved');

            if(messages.length>0){
              await sendTG(`📊 <b>Trading Monitor ${session.str}</b>\n\n`+messages.join('\n\n─────\n\n'));
              console.log(`Wysłano ${messages.length} wiadomości`);
            }else{
              console.log('Brak nowych sygnałów');
            }
          }

          main().catch(async e=>{
            console.error('FATAL:',e.message);
            try{await sendTG(`❌ <b>Trading Monitor BŁĄD</b>: ${e.message}`);}catch(_){}
            process.exit(1);
          });
          SCRIPT
        env:
          TD_KEY: ${{ secrets.TD_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Save signal cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signal-cache.json
          key: signals-${{ github.run_id }}
