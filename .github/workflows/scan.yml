name: Trading Monitor Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Send test message
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -z "$TG_TOKEN" ]; then
            echo "Brak TG_TOKEN"
            exit 1
          fi
          if [ -z "$TG_CHAT" ]; then
            echo "Brak TG_CHAT"
            exit 1
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=✅ Trading Monitor Scan działa"
