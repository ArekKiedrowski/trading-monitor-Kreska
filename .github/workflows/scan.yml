name: Trading Monitor Scan

on:
  schedule:
    - cron: '*/2 6-23 * * 1-5' # 8:00-01:00 Warsaw
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: signal-cache.json
          key: signals-${{ github.run_id }}
          restore-keys: |
            signals-

      - name: Scan markets and send Telegram
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const TD_KEY = process.env.TD_KEY;
          const TG_TOKEN = process.env.TG_TOKEN;
          const TG_CHAT = process.env.TG_CHAT;
          const isManual = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';

          // ─── KONFIG ──────────────────────────────────────────────

          // globalne ryzyko na trade – używane w tekście
          const RISK_PCT = 2.0;

          const INSTRUMENTS = [
            {key:'us500', name:'US500', sym:'ES=F',    src:'yahoo', sl:20,     tp:40,   dec:1, lot:0.05, rsiOB:70, rsiOS:30, atrPctMin:0.15, adxMin:22, atrSlMult:0.8, atrTpMult:2.0, srBuffer:0.0, scalpAtrMax:25,   scalpLot:0.03},
            {key:'gold',  name:'GOLD', sym:'XAU/USD', src:'td',    sl:25,     tp:50,   dec:1, lot:0.05, rsiOB:68, rsiOS:32, atrPctMin:0.20, adxMin:20, atrSlMult:1.0, atrTpMult:2.2, srBuffer:0.3, scalpAtrMax:18,   scalpLot:0.03},
            {key:'eurusd',name:'EUR/USD', sym:'EUR/USD',src:'td',  sl:0.0015, tp:0.003,dec:5, lot:0.05, rsiOB:65, rsiOS:35, atrPctMin:0.10, adxMin:18, atrSlMult:0.7, atrTpMult:1.8, srBuffer:0.0, scalpAtrMax:0.001,scalpLot:0.03}
            // tu później można dopisać BTC w tym samym formacie
          ];

          // ─── STATE ───────────────────────────────────────────────

          let cache = {};
          try {
            if (fs.existsSync('signal-cache.json')) {
              cache = JSON.parse(fs.readFileSync('signal-cache.json','utf8'));
              console.log('Cache:', JSON.stringify(cache).slice(0,200));
            }
          } catch(e) {
            console.log('No cache');
          }
          if (isManual) {
            cache = {};
            console.log('Manual - cache cleared');
          }
          if (!cache.dailyLog) cache.dailyLog = [];
          if (!cache.activePositions) cache.activePositions = {};

          // ─── HTTP ────────────────────────────────────────────────

          function fetchUrl(url, retries=2) {
            return new Promise((resolve, reject) => {
              const attempt = (n) => {
                https.get(url, {headers:{'User-Agent':'Mozilla/5.0'}}, res => {
                  let data='';
                  res.on('data', c => data+=c);
                  res.on('end', () => {
                    try {
                      resolve(JSON.parse(data));
                    } catch(e) {
                      if(n>0) setTimeout(()=>attempt(n-1),3000);
                      else reject(new Error('parse:'+data.slice(0,80)));
                    }
                  });
                }).on('error', e => {
                  if(n>0) setTimeout(()=>attempt(n-1),3000);
                  else reject(e);
                });
              };
              attempt(retries);
            });
          }

          function sendTG(msg) {
            const body = JSON.stringify({chat_id:TG_CHAT, text:msg, parse_mode:'HTML'});
            const opts = {
              hostname:'api.telegram.org',
              path:`/bot${TG_TOKEN}/sendMessage`,
              method:'POST',
              headers:{'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)}
            };
            return new Promise(resolve => {
              const req = https.request(opts, res => {
                let d='';
                res.on('data',c=>d+=c);
                res.on('end',()=>{console.log('TG:',d.slice(0,80));resolve();});
              });
              req.on('error', e=>{console.error('TG err:',e.message);resolve();});
              req.write(body);
              req.end();
            });
          }

          // ─── MATH / WSKAŹNIKI (bez zmian) ───────────────────────
          // (tu wklejony cały Twój istniejący kod: ema, rsiFn, atrFn, adxFn, rocFn, rollingCorr,
          //  calcADR, SR engine, analyzeTrend, analyzeH1, analyzeM15, calcConfidence,
          //  getThreshold, getSession, NEWS, fetchYahoo, fetchTD, checkBreakeven)
          // Uwaga: tej części NIE zmieniam – biorę ją 1:1 z Twojego obecnego pliku.

          // *** TU WKLEJ DOTYCHCZASOWY BLOK FUNKCJI (MATH, SR, SESSION, NEWS, FETCH, BE, itd.) ***

          // ─── MAIN ────────────────────────────────────────────────

          async function main() {
            const session=getSession();
            const threshold=getThreshold(session);
            const sessLabel=session.overlap?'Overlap ⚡':session.ny?'NY Open':session.london?'London':session.asian?'Azja':'Off-session';
            console.log(`${session.str} | ${sessLabel} | próg: ${threshold}`);

            // Podsumowanie dzienne – bez zmian
            if(session.isDailySummary){
              const log=cache.dailyLog||[];
              let msg=`📊 <b>Podsumowanie ${session.str}</b>\n\n`;
              if(log.length){
                msg+=`✅ ACTIVE: <b>${log.filter(s=>s.type==='ACTIVE').length}</b> · ⏳ FORMING: <b>${log.filter(s=>s.type==='FORMING').length}</b>\n\n`;
                const uniq=[...new Map(log.map(s=>[s.instr+s.type+s.dir,s])).values()];
                uniq.slice(0,10).forEach(s=>{msg+=`${s.time} ${s.instr} ${s.type} ${s.dir} [${s.score}]\n`;});
              } else {
                msg+='Brak sygnałów dzisiaj.';
              }
              await sendTG(msg);
              cache.dailyLog=[];
              fs.writeFileSync('signal-cache.json',JSON.stringify(cache));
              return;
            }

            if(!session.active){console.log('Poza godzinami');return;}

            // Alert 15:15 – bez zmian (weekly, RS, VIX)
            // *** TU WKLEJ TWÓJ ISTNIEJĄCY BLOK ALERT 15:15 BEZ ZMIAN ***

            const lastScan=cache.lastScanTime||0;
            if(lastScan>0&&(Date.now()-lastScan)>35*60*1000&&!isManual)
              await sendTG('⚠️ <b>Trading Monitor</b>: brak skanu przez 35+ min!');

            const [newsBlocked,vix,dxyData]=await Promise.all([
              getNewsBlocked(session),
              (async()=>{try{const d=await fetchYahoo('%5EVIX');return d.price;}catch(e){return null;}})(),
              (async()=>{try{return await fetchYahoo('UUP');}catch(e){return null;}})()
            ]);
            const dxyCloses=dxyData?dxyData.closes:[];
            const messages=[];
            const newCache={...cache,lastScanTime:Date.now()};
            if(!newCache.dailyLog) newCache.dailyLog=[];
            if(!newCache.activePositions) newCache.activePositions={};

            for(const instr of INSTRUMENTS){
              if(newsBlocked[instr.key]){console.log(`SKIP ${instr.name} news`);continue;}
              try{
                const data=instr.src==='yahoo'?await fetchYahoo(instr.sym):await fetchTD(instr.sym,'1h',100);
                const{closes,highs,lows,price,prev}=data;

                // Breakeven monitoring – bez zmian
                await checkBreakeven(price,instr.key,instr.name,newCache);

                const h1=analyzeH1(closes,highs,lows,instr);
                if(h1.dir==='INSUFFICIENT'){console.log(`${instr.name}: INSUFFICIENT`);continue;}

                // D1 + H4 + ADR
                let d1={trend:'NEUTRAL'},h4={trend:'NEUTRAL'},d1Data=null;
                if(instr.src==='td'){
                  try{await new Promise(r=>setTimeout(r,500));d1Data=await fetchTD(instr.sym,'1day',60);d1=analyzeTrend(d1Data.closes,d1Data.highs,d1Data.lows);}catch(e){}
                  try{await new Promise(r=>setTimeout(r,500));const d=await fetchTD(instr.sym,'4h',60);h4=analyzeTrend(d.closes,d.highs,d.lows);}catch(e){}
                }
                const adrResult=d1Data?calcADR(d1Data.highs,d1Data.lows,10):null;

                let dxyCorr=null;
                if(dxyCloses.length>=20&&closes.length>=20) dxyCorr=rollingCorr(dxyCloses,closes,20);

                let srResult=null;
                if(h1.atrVal){
                  const srDir=(h1.dir==='LONG'||h1.trendUp)?'LONG':'SHORT';
                  srResult=findBestSR(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),srDir,h1.atrVal,50);
                }

                const confDir=h1.dir==='LONG'?'LONG':h1.dir==='SHORT'?'SHORT':h1.trendUp?'LONG':'SHORT';
                const conf=calcConfidence({
                  dir:confDir,
                  adxVal:h1.adxVal||0,
                  rocVal:h1.rocVal,
                  rsiVal:h1.rsiVal,
                  d1trend:d1.trend,
                  h4trend:h4.trend,
                  session,
                  srQuality:srResult?srResult.quality:0,
                  overextended:h1.overextended||false,
                  dxyCorr,
                  vix,
                  instr,
                  clearPath:null,
                  adrPct:adrResult?adrResult.pct:null
                });

                const chg=prev?((price-prev)/prev*100):0;
                console.log(`${instr.name} | ${h1.dir} | ${price.toFixed(instr.dec)} | Score:${conf.score}/${threshold}`);

                if(h1.dir==='LONG'||h1.dir==='SHORT'){
                  const isL=h1.dir==='LONG';
                  const atr=h1.atrVal||instr.sl;
                  const ep=srResult&&srResult.quality>=55
                    ?parseFloat((isL?srResult.level-(instr.srBuffer*atr):srResult.level+(instr.srBuffer*atr)).toFixed(instr.dec))
                    :parseFloat(price.toFixed(instr.dec));
                  const sl=parseFloat((isL?ep-atr*instr.atrSlMult:ep+atr*instr.atrSlMult).toFixed(instr.dec));
                  const tp1=parseFloat((isL?ep+atr:ep-atr).toFixed(instr.dec));
                  const tp2=parseFloat((isL?ep+atr*instr.atrTpMult:ep-atr*instr.atrTpMult).toFixed(instr.dec));
                  const rr=Math.abs(tp2-ep)/Math.max(0.00001,Math.abs(sl-ep));

                  let clearPath=null;
                  if(h1.atrVal){
                    const pr=checkClearPath(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),ep,tp1,h1.dir,atr);
                    clearPath=pr.clear;
                    if(clearPath) conf.score=Math.min(100,conf.score+7);
                  }

                  let m15={confirmed:true,reason:'(brak M15)'};
                  if(instr.src==='td'){
                    try{
                      await new Promise(r=>setTimeout(r,500));
                      const m15d=await fetchTD(instr.sym,'15min',50);
                      m15=analyzeM15(m15d.closes,m15d.highs,m15d.lows,h1.dir);
                    }catch(e){}
                  }

                  const recentSweep=detectRecentLiqSweep(h1.highs||highs.slice(0,-1),h1.lows||lows.slice(0,-1),h1.closes||closes.slice(0,-1),h1.dir,3);
                  const calmATR=atr<=(instr.scalpAtrMax||20);

                  const isSignalA=conf.score>=threshold&&rr>=1.9&&m15.confirmed;
                  const isSignalB=conf.score>=85&&recentSweep&&calmATR&&rr>=1.2&&!isSignalA;
                  const isSignalAnoM15=conf.score>=threshold&&rr>=1.9&&!m15.confirmed;

                  const prevSig=cache[instr.key+'_sig'];
                  const thisSig=isSignalA?'A':isSignalB?'B':isSignalAnoM15?'A_WAIT':'DIR';
                  newCache[instr.key+'_sig']=thisSig;
                  newCache[instr.key+'_score']=conf.score;
                  newCache.dailyLog.push({time:session.str,instr:instr.name,type:'ACTIVE',score:conf.score,dir:h1.dir});

                  // ─── NOWE TEKSTY: SYGNAŁ A / B = "TAK WCHODŹ" ──────

                  if((isSignalA||isSignalB)&&prevSig!==thisSig){
                    const lot=isSignalB?instr.scalpLot:instr.lot;
                    const distToEntry=Math.abs(price-ep);
                    const isNear=distToEntry<=atr*0.4;
                    const entryLabel=isNear?'RYNKOWE':'LIMIT';

                    const dirLabel=isL?'LONG ▲':'SHORT ▼';
                    const typeLabel=isSignalA?'SYGNAŁ A':'SCALP B';

                    const msg =
`✅ <b>TAK WCHODŹ — ${typeLabel} ${dirLabel} ${instr.name}</b> [${conf.score}/${threshold}]

Wejście: <b>${entryLabel} ${ep}</b>
SL: <b>${sl}</b>
TP1: <b>${tp1}</b> (50% pozycji, potem SL na entry)
TP2: <b>${tp2}</b>
Lot: <b>${lot}</b>
Ryzyko: <b>${RISK_PCT.toFixed(1)}%</b> kapitału
RR: <b>1:${rr.toFixed(1)}</b>`;

                    messages.push(msg);

                    // zapis pozycji do breakeven monitoringu
                    newCache.activePositions[instr.key]={dir:h1.dir,entry:ep,sl,tp1,tp2,dec:instr.dec,beAlerted:false,tp1Alerted:false};
                  }
                  // ─── PRAWIE A (no M15) = "OBSERWUJ TEN POZIOM" ─────

                  else if(isSignalAnoM15&&prevSig!==thisSig){
                    const lot=instr.lot;
                    const dirLabel=isL?'LONG ▲':'SHORT ▼';

                    const msg =
`👀 <b>OBSERWUJ TEN POZIOM — PRAWIE ${dirLabel} ${instr.name}</b> [${conf.score}/${threshold}]

Obserwuj: <b>${ep}</b>
Warunek wejścia:
• poczekaj na M15: ${m15.reason}

Jeśli warunek się spełni:
• Entry: <b>${ep}</b>
• SL: <b>${sl}</b>
• TP1: <b>${tp1}</b>
• TP2: <b>${tp2}</b>
• Ryzyko: <b>${RISK_PCT.toFixed(1)}%</b> kapitału (Lot: <b>${lot}</b>)`;

                    messages.push(msg);
                  }

                } else if(h1.dir==='FORMING'){
                  // ─── FORMING = "ZBLIŻA SIĘ" ───────────────────────
                  const prevScore=cache[instr.key+'_score']||0;
                  const prevSig=cache[instr.key+'_sig'];
                  newCache[instr.key+'_score']=conf.score;
                  newCache[instr.key+'_sig']='FORMING';
                  newCache.dailyLog.push({
                    time:session.str,
                    instr:instr.name,
                    type:'FORMING',
                    score:conf.score,
                    dir:h1.trendUp?'LONG?':'SHORT?'
                  });

                  if(conf.score>=65 && conf.score<=threshold && conf.score>prevScore+3 && prevSig!=='FORMING'){
                    // policz też w FORMING wstępny plan (ep/sl/tp), jak wyżej
                    const isL = h1.trendUp; // kierunek planowany
                    const atr=h1.atrVal||instr.sl;
                    const ep=srResult&&srResult.quality>=55
                      ?parseFloat((isL?srResult.level-(instr.srBuffer*atr):srResult.level+(instr.srBuffer*atr)).toFixed(instr.dec))
                      :parseFloat(price.toFixed(instr.dec));
                    const sl=parseFloat((isL?ep-atr*instr.atrSlMult:ep+atr*instr.atrSlMult).toFixed(instr.dec));
                    const tp1=parseFloat((isL?ep+atr:ep-atr).toFixed(instr.dec));
                    const tp2=parseFloat((isL?ep+atr*instr.atrTpMult:ep-atr*instr.atrTpMult).toFixed(instr.dec));
                    const lot=instr.lot;

                    const dirLabel=isL?'LONG ▲':'SHORT ▼';
                    const waitReason=h1.reasons && h1.reasons.length
                      ? h1.reasons[0]
                      : 'warunki niekompletne';

                    const msg =
`🧪 <b>ZBLIŻA SIĘ — ${dirLabel} ${instr.name}</b> [${conf.score}/${threshold}]

Obserwuj: <b>${ep}</b>
Plan (NIE wchodź jeszcze):
• Entry: <b>${ep}</b>
• SL: <b>${sl}</b>
• TP1: <b>${tp1}</b>
• TP2: <b>${tp2}</b>
• Ryzyko: <b>${RISK_PCT.toFixed(1)}%</b> kapitału (Lot: <b>${lot}</b>)

Czekam na: ${waitReason}`;

                    messages.push(msg);
                  }
                } else {
                  newCache[instr.key+'_sig']='NO_SIGNAL';
                  newCache[instr.key+'_score']=0;
                }

              }catch(e){
                console.error(instr.name,e.message);
              }
            }

            fs.writeFileSync('signal-cache.json',JSON.stringify(newCache));
            if(messages.length>0){
              await sendTG(`📊 <b>Trading Monitor ${session.str}</b> [próg: ${threshold}]\n\n`+
                messages.join('\n\n─────\n\n'));
              console.log(`Wysłano ${messages.length} msg`);
            } else {
              console.log('Brak nowych sygnałów');
            }
          }

          main().catch(async e=>{
            console.error('FATAL:',e.message);
            try{await sendTG(`❌ <b>Trading Monitor BŁĄD</b>: ${e.message}`);}catch(_){}
            process.exit(1);
          });

          SCRIPT
        env:
          TD_KEY: ${{ secrets.TD_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Save signal cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signal-cache.json
          key: signals-${{ github.run_id }}
