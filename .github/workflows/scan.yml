name: Trading Monitor Scan

on:
  schedule:
    - cron: '*/5 6-22 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: signal-cache.json
          key: signals-${{ github.run_number }}
          restore-keys: |
            signals-

      - name: Scan markets and send Telegram
