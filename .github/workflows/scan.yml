Commit changes

Poczekaj chwilę i wejdź w Actions

Co powinno się stać
Po commicie scan.yml powinien sam się uruchomić, bo dodałeś trigger push tylko dla tego pliku.

Po pierwszym uruchomieniu workflow Trading Monitor Scan powinien już być widoczny normalnie na liście po lewej w Actions.

Jak to zrobisz, napisz tylko:
„poszedł run scan.yml” albo „dalej go nie ma”.

