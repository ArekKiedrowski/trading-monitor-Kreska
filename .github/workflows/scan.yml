name: Trading Monitor Scan

on:
  schedule:
    - cron: '*/5 6-22 * * 1-5'  # Co 5 min, pon-pt, 6:00-22:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: signal-cache.json
          key: signals-${{ github.run_number }}
          restore-keys: |
            signals-

      - name: Scan markets and send Telegram
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const TD_KEY = process.env.TD_KEY || '';
          const TG_WEBHOOK = process.env.TG_WEBHOOK || '';

          // Brak drukowania kluczy do logu
          if (!TD_KEY) console.log('⚠️ TD_KEY nie ustawiony — będzie tylko Yahoo data');
          if (!TG_WEBHOOK) console.log('⚠️ TG_WEBHOOK nie ustawiony — wiadomości nie będą wysłane');

          const INSTRUMENTS = [
            {key:'us500', name:'US500',   sym:'^GSPC',   src:'yahoo', sl:20,     tp:40,     dec:1, rsiOB:70, rsiOS:30, atrPctMin:0.15, adxMin:22},
            {key:'gold',  name:'GOLD',    sym:'XAUUSD',  src:'td',    sl:25,     tp:50,     dec:1, rsiOB:68, rsiOS:32, atrPctMin:0.20, adxMin:20},
            {key:'eurusd',name:'EURUSD',  sym:'EURUSD',  src:'td',    sl:0.0015, tp:0.003,  dec:5, rsiOB:65, rsiOS:35, atrPctMin:0.10, adxMin:18}
          ];

          // ─── STATE ───────────────────────────────────────────
          let lastSignals = {};
          try {
            if (fs.existsSync('signal-cache.json')) {
              lastSignals = JSON.parse(fs.readFileSync('signal-cache.json', 'utf8'));
              console.log('✓ Cache załadowany');
            }
          } catch(e) { 
            console.log('ℹ Brak cache'); 
          }

          const isManual = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';
          if (isManual) { 
            Object.keys(lastSignals).forEach(k => delete lastSignals[k]); 
            console.log('🔄 Manual run — cache czyszczony');
          }

          // ─── HTTP ─────────────────────────────────────────────
          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, {headers:{'User-Agent':'Mozilla/5.0'}}, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => { 
                  try { 
                    resolve(JSON.parse(data)); 
                  } catch(e) { 
                    reject(new Error('JSON parse failed')); 
                  } 
                });
              }).on('error', reject);
            });
          }

          function sendTelegram(msg) {
            if (!TG_WEBHOOK) {
              console.log('ℹ Telegram wyłączony (brak webhoocu)');
              return Promise.resolve();
            }
            const body = JSON.stringify({text: msg});
            const urlObj = new URL(TG_WEBHOOK);
            const options = {
              hostname: urlObj.hostname,
              path: urlObj.pathname + urlObj.search,
              method: 'POST',
              headers: {'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body)}
            };
            return new Promise(resolve => {
              const req = https.request(options, res => { 
                let d=''; 
                res.on('data',c=>d+=c); 
                res.on('end',()=>{
                  if (res.statusCode < 300) {
                    console.log('✓ Telegram: wiadomość wysłana');
                  } else {
                    console.log('✗ Telegram: ' + res.statusCode);
                  }
                  resolve();
                }); 
              });
              req.on('error', e => { 
                console.log('✗ Telegram error: ' + e.message); 
                resolve(); 
              });
              req.write(body); 
              req.end();
            });
          }

          // ─── NEWS BLOCK (per-instrument) ──────────────────────────
          const NEWS_RULES = {
            us500: {keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','ISM','Unemployment','Retail Sales','PPI'],countries:['USD'],impacts:['High','Medium']},
            gold:  {keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','Interest Rate','Inflation','PPI'],countries:['USD'],impacts:['High']},
            eurusd:{keywords:['Fed','FOMC','CPI','NFP','Nonfarm','GDP','ISM','ECB','Interest Rate','PMI','Inflation','Unemployment'],countries:['USD','EUR'],impacts:['High','Medium']}
          };

          function isEventBlockingInstr(ev, instrKey) {
            const rule = NEWS_RULES[instrKey];
            if (!rule||!rule.countries.includes(ev.country)) return false;
            if (!rule.impacts.includes(ev.impact)) return false;
            if (ev.impact === 'High') return true;
            return rule.keywords.some(k => ev.title&&ev.title.toLowerCase().includes(k.toLowerCase()));
          }

          async function getNewsBlockedMap() {
            const blocked = {us500:false,gold:false,eurusd:false};
            try {
              const d = await fetchUrl('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
              const now = new Date();
              const wOffset = 1;  // UTC+1
              const wTime = new Date(now.getTime()+wOffset*3600000);
              const todayStr = wTime.toISOString().split('T')[0];
              const nowMin = wTime.getUTCHours()*60+wTime.getUTCMinutes();

              d.forEach(e => {
                if (!e.date) return;
                const evDate = new Date(e.date);
                if (evDate.toISOString().split('T')[0]!==todayStr) return;
                const evMin = evDate.getUTCHours()*60+evDate.getUTCMinutes()+wOffset*60;
                if (Math.abs(evMin-nowMin)>30) return;

                ['us500','gold','eurusd'].forEach(key=>{
                  if(isEventBlockingInstr(e,key)){
                    blocked[key]=true;
                    console.log(`⚠️ NEWS BLOCK ${key}: ${e.title} (${e.country})`);
                  }
                });
              });
            } catch(e) { 
              console.log('ℹ Calendar error — sygnały dozwolone'); 
            }
            return blocked;
          }

          // ─── MATH ─────────────────────────────────────────────
          function ema(data, period) {
            if (data.length < period) return null;
            const k = 2/(period+1);
            let e = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
            for (let i=period;i<data.length;i++) e = data[i]*k+e*(1-k);
            return e;
          }

          function rsi(closes, period=14) {
            if (closes.length < period+1) return null;
            let gains=0, losses=0;
            for (let i=closes.length-period;i<closes.length;i++) {
              const d = closes[i]-closes[i-1];
              if (d>0) gains+=d; else losses+=Math.abs(d);
            }
            const ag=gains/period, al=losses/period;
            if (al===0) return 100;
            return 100-(100/(1+ag/al));
          }

          function atr(highs, lows, closes, period=14) {
            if (closes.length < period+1) return null;
            const trs = [];
            for (let i=1;i<closes.length;i++)
              trs.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
            return trs.slice(-period).reduce((a,b)=>a+b,0)/period;
          }

          function adx(highs, lows, closes, period=14) {
            if (closes.length < period*2) return null;
            const dms=[], dmm=[];
            for (let i=1;i<closes.length;i++) {
              const up=highs[i]-highs[i-1], down=lows[i-1]-lows[i];
              dms.push(up>down&&up>0?up:0);
              dmm.push(down>up&&down>0?down:0);
            }
            const trList=[];
            for (let i=1;i<closes.length;i++)
              trList.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
            let atrS=trList.slice(0,period).reduce((a,b)=>a+b,0);
            let dmPS=dms.slice(0,period).reduce((a,b)=>a+b,0);
            let dmMS=dmm.slice(0,period).reduce((a,b)=>a+b,0);
            const dxList=[];
            for (let i=period;i<trList.length;i++) {
              atrS=atrS-atrS/period+trList[i];
              dmPS=dmPS-dmPS/period+dms[i];
              dmMS=dmMS-dmMS/period+dmm[i];
              const diP=atrS>0?100*dmPS/atrS:0;
              const diM=atrS>0?100*dmMS/atrS:0;
              const dx=diP+diM>0?100*Math.abs(diP-diM)/(diP+diM):0;
              dxList.push(dx);
            }
            if (dxList.length < period) return null;
            return dxList.slice(-period).reduce((a,b)=>a+b,0)/period;
          }

          function roc(closes, period=10) {
            if (closes.length < period+1) return null;
            const cur=closes[closes.length-1], prev=closes[closes.length-1-period];
            return prev>0?(cur-prev)/prev*100:null;
          }

          // ─── ANALYSIS ─────────────────────────────────────────
          function analyze(closes, highs, lows, instr) {
            const c = closes.slice(0,-1);
            const h = highs.slice(0,-1);
            const l = lows.slice(0,-1);
            if (c.length < 50) return {dir:'NO_SIGNAL'};

            const e20=ema(c,20), e50=ema(c,50);
            const e20p=ema(c.slice(0,-5),20), e50p=ema(c.slice(0,-5),50);
            const atrVal=atr(h,l,c,14);
            const adxVal=adx(h,l,c,14);
            const rocVal=roc(c,8);
            const rsiVal=rsi(c,14);
            const price=c[c.length-1];
            const atrPct=atrVal?(atrVal/price*100):0;

            const trendUp=e20>e50, trendDown=e20<e50;
            const tsUp=trendUp?(e20-e50)>(e20p-e50p):(e50-e20)>(e50p-e20p);
            const volOk=atrPct>=(instr.atrPctMin||0.15);
            const trendStrong=!adxVal||(adxVal>=(instr.adxMin||20));
            const aboveEMA=price>e20&&price>e50;
            const belowEMA=price<e20&&price<e50;
            const mom=rocVal!==null?rocVal:0;
            const overextLong=atrVal&&(price>e20+2.5*atrVal);
        
