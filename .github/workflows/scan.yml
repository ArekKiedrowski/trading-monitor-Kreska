function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// --- HTTP / TELEGRAM ---
function fetchUrl(url, retries = 2) {
  return new Promise((resolve, reject) => {
    const attempt = (n) => {
      https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, res => {
        let data = '';
        res.on('data', c => data += c);
        res.on('end', () => {
          try { resolve(JSON.parse(data)); }
          catch (e) {
            if (n > 0) setTimeout(() => attempt(n - 1), 3000);
            else reject(new Error('Parse fail: ' + e.message));
          }
        });
      }).on('error', e => {
        if (n > 0) setTimeout(() => attempt(n - 1), 3000);
        else reject(e);
      });
    };
    attempt(retries);
  });
}

function sendToTelegram(topicType, message) {
  if (!TG_TOKEN || !TG_CHAT_ID) {
    console.log('TG skipped (missing token/chat_id)');
    return Promise.resolve();
  }
  const threadId = TG_THREADS[topicType] || null;
  const prefix =
    topicType === 'SETUP' ? '<b>[🔥 SETUP]</b>\n' :
    topicType === 'TRADE' ? '<b>[📊 TRADE]</b>\n' :
                            '<b>[⚙️ SYSTEM]</b>\n';

  const body = JSON.stringify({
    chat_id: TG_CHAT_ID,
    message_thread_id: threadId,
    text: prefix + message,
    parse_mode: 'HTML'
  });

  const opts = {
    hostname: 'api.telegram.org',
    path: `/bot${TG_TOKEN}/sendMessage`,
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Content-Length': Buffer.byteLength(body)
    }
  };

  return new Promise(resolve => {
    const req = https.request(opts, res => {
      res.on('data', () => {});
      res.on('end', () => resolve());
    });
    req.on('error', e => {
      console.log('TG error:', e.message);
      resolve();
    });
    req.write(body);
    req.end();
  });
}

// --- INDIKATORY ---
function ema(data, period) {
  if (!data || data.length < period) return null;
  const k = 2 / (period + 1);
  let value = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < data.length; i++) {
    value = data[i] * k + value * (1 - k);
  }
  return value;
}

function atrFn(highs, lows, closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < closes.length; i++) {
    trs.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i - 1]),
      Math.abs(lows[i] - closes[i - 1])
    ));
  }
  return trs.slice(-period).reduce((a,b)=>a+b,0) / period;
}

function adxFn(highs, lows, closes, period = 14) {
  if (!closes || closes.length < period * 2) return null;
  const dmP = [], dmM = [], trL = [];
  for (let i = 1; i < closes.length; i++) {
    const up = highs[i] - highs[i - 1];
    const dn = lows[i - 1] - lows[i];
    dmP.push(up > dn && up > 0 ? up : 0);
    dmM.push(dn > up && dn > 0 ? dn : 0);
    trL.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i - 1]),
      Math.abs(lows[i] - closes[i - 1])
    ));
  }
  let atr = trL.slice(0, period).reduce((a,b)=>a+b,0);
  let p   = dmP.slice(0, period).reduce((a,b)=>a+b,0);
  let m   = dmM.slice(0, period).reduce((a,b)=>a+b,0);
  const dxs = [];
  for (let i = period; i < trL.length; i++) {
    atr = atr - atr/period + trL[i];
    p   = p   - p/period   + dmP[i];
    m   = m   - m/period   + dmM[i];
    const dp = atr > 0 ? 100 * p / atr : 0;
    const dm = atr > 0 ? 100 * m / atr : 0;
    dxs.push(dp + dm > 0 ? 100 * Math.abs(dp - dm) / (dp + dm) : 0);
  }
  if (dxs.length < period) return null;
  return dxs.slice(-period).reduce((a,b)=>a+b,0) / period;
}

// --- LOGIKA SETUPÓW ---
function detectSetup(closes, highs, lows, atrVal) {
  if (closes.length < 22) return null;

  const h = highs.slice(0, -1);
  const l = lows.slice(0, -1);
  const recentHigh = Math.max(...h.slice(-20));
  const recentLow  = Math.min(...l.slice(-20));

  const close = closes[closes.length - 1];
  const high  = highs[highs.length - 1];
  const low   = lows[lows.length  - 1];

  // Failed breakout
  if (high > recentHigh && close < recentHigh)
    return { type:'FAILED_BREAKOUT', dir:'SHORT', level:recentHigh };
  if (low  < recentLow  && close > recentLow)
    return { type:'FAILED_BREAKOUT', dir:'LONG',  level:recentLow  };

  // Impulse + pullback
  if (atrVal && closes.length >= 12) {
    const move5   = closes[closes.length-1] - closes[closes.length-6];
    const retrace = closes[closes.length-1] - closes[closes.length-3];
    if (move5 >  atrVal * 1.5 && Math.abs(retrace) < Math.abs(move5)*0.5)
      return { type:'IMPULSE_PULLBACK', dir:'LONG' };
    if (move5 < -atrVal * 1.5 && Math.abs(retrace) < Math.abs(move5)*0.5)
      return { type:'IMPULSE_PULLBACK', dir:'SHORT' };
  }

  // (opcjonalnie można dodać BREAKOUT)
  return null;
}

function checkClearPath(highs, lows, entry, tp1, atrVal) {
  const minL = Math.min(entry, tp1);
  const maxL = Math.max(entry, tp1);
  const tol  = (atrVal || 1) * 0.2;
  let obstacles = 0;

  const start = Math.max(0, highs.length - 30);
  for (let i = start; i < highs.length; i++) {
    if (highs[i] > minL + tol && highs[i] < maxL - tol) obstacles++;
    if (lows[i]  > minL + tol && lows[i]  < maxL - tol) obstacles++;
  }
  return obstacles === 0;
}

// --- RISK SCORE + STATUS ---
function calcRiskScore({ setup, regime, session, clearPath, overextended, vix, instr }) {
  let risk = 0;
  const reasons = [];

  if (overextended) { risk += 20; reasons.push('overextended'); }
  if (!clearPath)   { risk += 20; reasons.push('no clear path'); }
  if (setup.type === 'FAILED_BREAKOUT' && regime === 'TREND') {
    risk += 10; reasons.push('FB vs trend');
  }
  if (!session.overlap && !session.ny && !session.london) {
    risk += 15; reasons.push('bad session');
  }
  if (instr.key === 'us500' && vix > 30 && setup.dir === 'LONG') {
    risk += 15; reasons.push('VIX high');
  }

  risk = Math.min(100, risk);

  let band, action;
  if (risk >= 65)      { band = 'HIGH';      action = 'SKIP';  }
  else if (risk >= 45) { band = 'ELEVATED';  action = 'WATCH'; }
  else if (risk >= 25) { band = 'MODERATE';  action = 'WATCH'; }
  else                 { band = 'LOW';       action = 'TRADE'; }

  return { risk, band, action, reasons };
}

// --- LIMIT EKSPOZYCJI ---
// size = ilość kontraktów / lotów, entry = cena
function applyExposureCap(size, entry) {
  const positionValue = size * entry;
  const maxValue      = ACCOUNT_BALANCE * MAX_EXPOSURE;

  if (positionValue > maxValue) {
    const cappedSize = maxValue / entry;
    return {
      size:  cappedSize,
      value: maxValue,
      capped: true
    };
  }
  return {
    size,
    value: positionValue,
    capped: false
  };
}

// --- DATA FETCH ---
async function fetchYahoo(sym) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1h&range=30d`;
  const d   = await fetchUrl(url);
  const res = d?.chart?.result?.[0];
  if (!res) throw new Error('No Yahoo data');
  const q   = res.indicators.quote[0];

  return {
    closes: (q.close||[]).filter(v=>v!=null),
    highs:  (q.high ||[]).filter(v=>v!=null),
    lows:   (q.low  ||[]).filter(v=>v!=null),
    price:  res.meta.regularMarketPrice,
    prev:   res.meta.previousClose
  };
}

async function fetchTD(sym, interval='1h', outputsize=100) {
  await sleep(600);
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=${interval}&outputsize=${outputsize}&apikey=${TD_KEY}`;
  const d   = await fetchUrl(url);
  if (d.status === 'error') throw new Error(d.message);
  const v = d.values;

  return {
    closes: v.map(x=>parseFloat(x.close)).reverse(),
    highs:  v.map(x=>parseFloat(x.high)).reverse(),
    lows:   v.map(x=>parseFloat(x.low)).reverse(),
    price:  parseFloat(v[0].close),
    prev:   parseFloat(v[1].close)
  };
}

// --- MAIN ---
async function main() {
  const now        = new Date();
  const warsawTime = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Warsaw' }));
  const h          = warsawTime.getHours();
  const m          = warsawTime.getMinutes();
  const total      = h*60 + m;

  const session = {
    str:      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'),
    overlap:  total>=900 && total<1020,
    ny:       total>=900 && total<1080,
    london:   total>=540 && total<720,
    active:   (total>=480 || total<=60)
  };

  console.log('Session', session.str);

  if (!session.active && !isManual) {
    console.log('Outside active hours – skip');
    return;
  }

  const [vix] = await Promise.all([
    (async()=>{ try{ const d=await fetchYahoo('%5EVIX'); return d.price; } catch(_){ return 20; } })()
  ]);

  const newCache = {...cache, lastScanTime: Date.now()};
  const messages = [];

  for (const instr of INSTRUMENTS) {
    try {
      const data  = instr.src === 'yahoo'
        ? await fetchYahoo(instr.sym)
        : await fetchTD(instr.sym, '1h', 100);

      const { closes, highs, lows, price, prev } = data;

      const atrVal = atrFn(highs, lows, closes, 14);
      const adxVal = adxFn(highs, lows, closes, 14);
      const regime = (adxVal || 0) > (instr.adxMin || 20) ? 'TREND' : 'RANGE';

      const setup = detectSetup(closes, highs, lows, atrVal);

      // --- RADAR STATUS ---
      let radarStatus = 'SCANNING';
      let radarScore  = 50;

      if (setup) {
        radarStatus = 'WATCH';
        radarScore  = 70;
      }

      newCache.radar[instr.key] = {
        name:   instr.name,
        status: radarStatus,
        score:  radarScore,
        regime,
        price:  price.toFixed(instr.dec),
        ts:     Date.now()
      };

      if (!setup) {
        console.log(`${instr.name}: no setup`);
        continue;
      }

      // --- RYZYKO + CLEAR PATH ---
      const tp1Est     = setup.dir === 'LONG' ? price + atrVal : price - atrVal;
      const clearPath  = checkClearPath(highs, lows, price, tp1Est, atrVal);
      const overextend = false; // placeholder – możesz dodać logikę na ATR/EMA

      const riskData = calcRiskScore({
        setup,
        regime,
        session,
        clearPath,
        overextended: overextend,
        vix,
        instr
      });

      // Update radar z dokładniejszym statusem
      if (riskData.action === 'SKIP') {
        newCache.radar[instr.key].status = 'SKIP';
        newCache.radar[instr.key].score  = 40;
      } else if (riskData.band === 'LOW') {
        newCache.radar[instr.key].status = 'TRIGGER';
        newCache.radar[instr.key].score  = 90;
      } else {
        newCache.radar[instr.key].status = 'WATCH';
        newCache.radar[instr.key].score  = 75;
      }

      // --- SIZING + LIMIT EXPOSURE ---
      // bazowy size z risk per trade (np. 1% equity / SL)
      const riskPct   = 0.01; // 1% na trade – możesz później zrobić param
      const riskUsd   = ACCOUNT_BALANCE * riskPct;
      const slDollar  = instr.sl;
      const rawSize   = slDollar > 0 ? (riskUsd / slDollar) : instr.lot;

      const { size, value, capped } = applyExposureCap(rawSize, price);

      // redukcja w zależności od band
      let finalSize = size;
      if (riskData.band === 'MODERATE') finalSize = size * 0.5;
      if (riskData.band === 'ELEVATED') finalSize = size * 0.25;

      // --- DECYZJA / ALERT ---
      if (riskData.action === 'SKIP') {
        console.log(`${instr.name}: setup SKIP, risk ${riskData.risk}`);
        continue;
      }

      const chg = prev ? ((price - prev) / prev * 100).toFixed(2) : '?';

      const msg =
        `<b>${riskData.band}-RISK ${setup.type} ${setup.dir} ${instr.name}</b>\n` +
        `Cena: ${price.toFixed(instr.dec)} (${chg}%)\n` +
        `Size: ${finalSize.toFixed(3)} (raw ${size.toFixed(3)}) ${capped ? '(CAPPED 1x)' : ''}\n` +
        `Value: $${value.toFixed(0)} / Equity: $${ACCOUNT_BALANCE}\n` +
        `Regime: ${regime} · Risk: ${riskData.risk}\n` +
        (riskData.reasons.length ? `⚠️ ${riskData.reasons.join(', ')}` : '');

      messages.push(msg);

    } catch (e) {
      console.log(`Err ${instr.name}:`, e.message);
    }
  }

  fs.writeFileSync('signal-cache.json', JSON.stringify(newCache, null, 2));

  if (messages.length > 0) {
    await sendToTelegram('SETUP', messages.join('\n\n─────\n\n'));
    console.log('Messages sent:', messages.length);
  } else if (isManual) {
    await sendToTelegram('SYSTEM', `✅ Manual scan ${new Date().toISOString()} – no new setups.`);
  } else {
    console.log('No new setups');
  }
}

main().catch(async e => {
  console.error('FATAL:', e);
  try {
    await sendToTelegram('SYSTEM', `❌ Trading Monitor error: ${e.message}`);
  } catch {}
  process.exit(1);
});
